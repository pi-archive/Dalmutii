<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti: Elite Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        :root { --gold: #dfbb69; --parchment: #f4e4bc; --table-green: #1a3c2a; --bg: #0a0c10; --card-red: #d32f2f; --ink: #2c1810; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: var(--bg); color: #eee; font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; }

        /* [Security & Lobby Modals] */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal { background: #1a1f26; padding: 40px; border-radius: 12px; border: 2px solid var(--gold); text-align: center; width: 480px; box-shadow: 0 0 60px #000; }
        .modal h1 { font-family: 'Cinzel'; color: var(--gold); margin-bottom: 25px; letter-spacing: 3px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--gold); padding: 14px; border-radius: 4px; font-family: 'Cinzel'; margin-bottom: 12px; outline: none; }
        .btn { display: block; width: 100%; padding: 15px; margin: 8px 0; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: var(--gold); color: black; }
        
        #room-list { background: rgba(0,0,0,0.5); height: 180px; overflow-y: auto; border: 1px solid #333; margin: 15px 0; }
        .room-item { background: #222; padding: 12px; margin: 5px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; cursor: pointer; }

        /* [Arena & Game UI] */
        #main-game { flex: 1; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.5s; }
        #main-game.active { opacity: 1; pointer-events: all; }
        #arena { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a22 0%, #05070a 100%); position: relative; overflow: hidden; }
        .table { width: 92%; height: 350px; background: var(--table-green); border: 14px solid #2a1a10; border-radius: 180px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 25px 60px #000; }
        
        .card { width: 85px; height: 125px; background: white; color: black; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; font-weight: 900; position: relative; transition: 0.2s; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card.selected { transform: translateY(-35px) !important; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        .played-card { animation: toss 0.4s ease-out forwards; margin: 0 4px; }
        @keyframes toss { from { transform: scale(1.6) translateY(250px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #player-area { height: 240px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; padding: 15px; border-top: 2px solid #333; }
        #hand { display: flex; margin-top: 20px; }
        #hand .card { margin-left: -35px; }

        /* [Social Rank & Effects] */
        .rank-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; background: #333; color: #fff; margin-left: 5px; font-family: 'Cinzel'; }
        .rank-1 { background: var(--gold); color: #000; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; pointer-events: none; animation: p-fade 1.5s ease-out forwards; }
        @keyframes p-fade { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); } }
    </style>
</head>
<body>

    <div id="lobby-modal" class="overlay">
        <div class="modal">
            <h1>DALMUTI ELITE</h1>
            <input type="text" id="nick-input" placeholder="ENTER NOBLE NAME">
            <input type="password" id="admin-pw" placeholder="ADMIN PASSCODE (00123)">
            <button class="btn" onclick="checkAdminCreate()">CREATE SECURE COURT</button>
            <div id="room-list"></div>
            <button class="btn" style="border-color:#666; color:#666;" onclick="initNPCMode()">FREE NPC PRACTICE</button>
        </div>
    </div>

    <div id="create-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h1>COURT SETTINGS</h1>
            <input type="text" id="room-title" placeholder="COURT NAME">
            <input type="password" id="entry-pw" placeholder="ENTRY PASSWORD">
            <button class="btn" onclick="finalizeRoom()">ESTABLISH COURT</button>
            <button class="btn" style="border:none;" onclick="cancelCreate()">BACK</button>
        </div>
    </div>

    <div id="join-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h1>ENTER COURT</h1>
            <p id="target-room-name" style="color:var(--gold); font-family:Cinzel;"></p>
            <input type="password" id="input-join-pw" placeholder="PASSWORD">
            <button class="btn" onclick="verifyJoin()">JOIN</button>
            <button class="btn" style="border:none;" onclick="cancelJoin()">CANCEL</button>
        </div>
    </div>

    <div id="left-panel" style="width:300px; background:#111; padding:15px; border-right:2px solid #222;">
        <div class="parchment" style="background:var(--parchment); color:var(--ink); padding:20px; height:100%; border-radius:3px; overflow-y:auto;">
            <h2 style="font-family:Cinzel">The Feudal Orders</h2>
            <div id="rule-box"></div>
        </div>
    </div>

    <main id="main-game">
        <div id="arena">
            <div id="status-text" style="position:absolute; top:20px; color:var(--gold); font-size:1.2rem; font-family:Cinzel;">WAITING...</div>
            <div id="host-zone" style="display:none;"><button class="btn" onclick="requestStart()">START NEXT ROUND</button></div>
            <div class="table"><div id="table-cards" style="display:flex;"></div></div>
        </div>
        <div id="player-area">
            <div id="play-btns" style="display:none;">
                <button class="btn" id="btn-rev" style="display:none; width:130px; border-color:red; color:red;" onclick="triggerRevolution()">REVOLUTION!</button>
                <button class="btn" id="btn-submit" style="display:inline-block; width:130px;" onclick="submitMove()">SUBMIT</button>
                <button class="btn" id="btn-pass" style="display:inline-block; width:130px; margin-left:10px;" onclick="passTurn()">PASS</button>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <aside style="width:320px; background:#0a0c10; border-left:2px solid #222; padding:15px; display:flex; flex-direction:column;">
        <h3 style="color:var(--gold); font-family:Cinzel; text-align:center;">SOCIAL STATUS</h3>
        <div id="p-list" style="flex:1"></div>
        <div id="game-logs" style="height:200px; overflow-y:auto; font-size:0.75rem; color:#888; border-top:1px solid #222; padding-top:10px;"></div>
        <input type="text" id="chat-box" placeholder="Chat..." style="background:#000; border:1px solid #333; color:white; padding:10px;" onkeypress="sendChat(event)">
    </aside>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            authDomain: "gamee-10378.firebaseapp.com",
            projectId: "gamee-10378",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            storageBucket: "gamee-10378.firebasestorage.app",
            messagingSenderId: "959963691936",
            appId: "1:959963691936:web:9efdefbcc3efb86bbec2c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const JOBS = ["", "Greater Dalmuti", "Lesser Dalmuti", "Archbishop", "Abbot", "Knight", "Cavalier", "Merchant", "Yeoman", "Shepherd", "Cook", "Mason", "Seamstress", "Peasant"];
        let myId = 'u_' + Math.random().toString(36).substr(2, 9);
        let myName = "", currentRoomId = null, isHost = false, selected = [], gameState = {}, targetRoomData = null;

        const rb = document.getElementById('rule-box');
        for(let i=1; i<=13; i++) rb.innerHTML += `<div style="margin-bottom:3px">${i}. ${JOBS[i]}</div>`;

        // [1. SECURITY LOGIC]
        function checkAdminCreate() {
            if(document.getElementById('admin-pw').value !== "00123") return alert("WRONG ADMIN CODE");
            myName = document.getElementById('nick-input').value.trim();
            if(!myName) return alert("ENTER NAME");
            document.getElementById('lobby-modal').style.display = 'none';
            document.getElementById('create-modal').style.display = 'flex';
        }

        function finalizeRoom() {
            const title = document.getElementById('room-title').value.trim();
            const pw = document.getElementById('entry-pw').value;
            if(!title || !pw) return alert("FILL ALL");
            currentRoomId = 'court_' + Date.now();
            isHost = true;
            db.ref('rooms/' + currentRoomId).set({
                hostId: myId, hostName: myName, roomTitle: title, password: pw,
                status: 'waiting', players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], taxCancelled: false
            });
            enterGame();
        }

        db.ref('rooms').on('value', snap => {
            const list = document.getElementById('room-list'); list.innerHTML = '';
            const rooms = snap.val(); if(!rooms) return;
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const div = document.createElement('div');
                div.className = 'room-item';
                div.innerHTML = `<span>🏰 ${r.roomTitle}</span><span>🔒</span>`;
                div.onclick = () => { currentRoomId = id; targetRoomData = r; document.getElementById('join-modal').style.display = 'flex'; };
                list.appendChild(div);
            });
        });

        function verifyJoin() {
            if(document.getElementById('input-join-pw').value === targetRoomData.password) {
                myName = document.getElementById('nick-input').value.trim();
                db.ref('rooms/' + currentRoomId + '/players/' + myId).set({ name: myName, cards: [], rank: 99 });
                enterGame();
            } else alert("WRONG PW");
        }

        function enterGame() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            document.getElementById('main-game').classList.add('active');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                gameState = snap.val(); if(!gameState) return;
                updateUI();
            });
        }

        // [2. CORE GAME ENGINE - NO OMISSIONS]
        function requestStart() {
            let deck = [];
            for(let i=1; i<=12; i++) for(let j=0; j<i; j++) deck.push(i);
            deck.push(13, 13); deck.sort(() => Math.random() - 0.5);

            let pIds = Object.keys(gameState.players);
            
            // 📊 계급 재배치 로직 (탈출 순서가 있으면 그 순서대로 랭크 부여)
            if(gameState.finishedPlayers) {
                const lastRank = [...gameState.finishedPlayers];
                pIds.forEach(id => { if(!lastRank.includes(id)) lastRank.push(id); });
                pIds = lastRank;
            } else {
                pIds.sort((a,b) => (gameState.players[a].rank || 99) - (gameState.players[b].rank || 99));
            }

            pIds.forEach((id, idx) => {
                gameState.players[id].cards = [];
                gameState.players[id].rank = idx + 1; // 1=Dalmuti, n=Peasant
            });

            // 카드 분배
            let pIdx = 0; while(deck.length > 0) { gameState.players[pIds[pIdx % pIds.length]].cards.push(deck.pop()); pIdx++; }

            // 💰 세금 상납 로직 (혁명 발생 안 했을 때만)
            if(gameState.status === 'playing' && !gameState.taxCancelled) {
                const dal = pIds[0], pea = pIds[pIds.length-1];
                gameState.players[pea].cards.sort((a,b)=>a-b);
                const tax = gameState.players[pea].cards.splice(0, 2); // 농노의 가장 좋은 패 2장
                gameState.players[dal].cards.push(...tax);
                
                gameState.players[dal].cards.sort((a,b)=>b-a);
                const gift = gameState.players[dal].cards.splice(0, 2); // 달무티의 가장 나쁜 패 2장
                gameState.players[pea].cards.push(...gift);
                log("TAX", "The Lord collected tax from the Peasant.");
            }

            db.ref('rooms/' + currentRoomId).update({
                players: gameState.players, turnOrder: pIds, turnIndex: 0, status: 'playing',
                tableCards: [], lastMove: { rank: 14, count: 0, owner: "" },
                passCount: 0, finishedPlayers: null, taxCancelled: false
            });
        }

        function updateUI() {
            const pIds = gameState.turnOrder || [];
            const pList = document.getElementById('p-list'); pList.innerHTML = '';
            pIds.forEach((id, i) => {
                const p = gameState.players[id]; const active = gameState.turnIndex === i;
                const isFinished = (gameState.finishedPlayers || []).includes(id);
                pList.innerHTML += `<div id="p-${id}" style="padding:10px; margin-bottom:5px; background:${active?'rgba(223,187,105,0.15)':'#111'}; opacity:${isFinished?0.4:1}">
                    <b>${p.name}</b> <span class="rank-tag rank-${i+1}">${JOBS[i+1]}</span>
                    <div style="font-size:0.7rem; color:#666;">Cards: ${p.cards?.length || 0}</div></div>`;
            });

            const h = document.getElementById('hand'); h.innerHTML = '';
            const myCards = (gameState.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((n, i) => {
                const c = document.createElement('div');
                c.className = `card ${selected.includes(i)?'selected':''}`;
                c.innerHTML = `<div>${n}</div><div style="font-size:0.6rem; color:var(--card-red)">${JOBS[n]}</div>`;
                c.onclick = () => {
                    if(pIds[gameState.turnIndex] === myId) {
                        const val = myCards[i];
                        if(selected.length > 0) {
                            const firstVal = myCards[selected[0]];
                            if(val !== 13 && firstVal !== 13 && val !== firstVal) return; 
                        }
                        const pos = selected.indexOf(i); if(pos > -1) selected.splice(pos,1); else selected.push(i);
                        updateUI();
                    }
                };
                h.appendChild(c);
            });

            // [혁명 버튼] 조커 2장 보유 시
            document.getElementById('btn-rev').style.display = (myCards.filter(n=>n===13).length === 2) ? 'inline-block' : 'none';

            const tc = document.getElementById('table-cards'); tc.innerHTML = '';
            (gameState.tableCards || []).forEach(n => tc.innerHTML += `<div class="card played-card"><div>${n}</div></div>`);

            const myTurn = pIds[gameState.turnIndex] === myId;
            document.getElementById('play-btns').style.display = gameState.status === 'playing' ? 'block' : 'none';
            document.getElementById('btn-submit').disabled = !myTurn || selected.length === 0;
            document.getElementById('btn-pass').disabled = !myTurn || gameState.lastMove.owner === "";
            document.getElementById('host-zone').style.display = (isHost && gameState.status !== 'playing') ? 'block' : 'none';
            document.getElementById('status-text').innerText = gameState.players[pIds[gameState.turnIndex]]?.name + "'s Turn";
        }

        // [3. ACTIONS & WIN EFFECTS]
        function submitMove() {
            const hand = gameState.players[myId].cards.sort((a,b)=>a-b);
            let r = hand[selected[0]];
            // 조커 처리: 조커가 다른 카드와 나오면 그 카드 숫자가 됨
            if(r === 13) {
                const nonJoker = selected.find(idx => hand[idx] !== 13);
                r = nonJoker !== undefined ? hand[nonJoker] : 13;
            }
            const c = selected.length;

            if(gameState.lastMove.owner === "" || (r < gameState.lastMove.rank && c === gameState.lastMove.count)) {
                const newHand = [...hand]; selected.sort((a,b)=>b-a).forEach(idx => newHand.splice(idx, 1));
                selected = [];
                if(newHand.length === 0) triggerWin(myId);
                
                let nextIdx = (gameState.turnIndex + 1) % gameState.turnOrder.length;
                while((gameState.finishedPlayers || []).includes(gameState.turnOrder[nextIdx])) {
                    nextIdx = (nextIdx + 1) % gameState.turnOrder.length;
                }

                db.ref('rooms/' + currentRoomId).update({
                    turnIndex: nextIdx, lastMove: { rank: r, count: c, owner: myId },
                    tableCards: Array(c).fill(r), passCount: 0, [`players/${myId}/cards`]: newHand
                });
            }
        }

        function triggerWin(id) {
            const finished = [...(gameState.finishedPlayers || []), id];
            db.ref('rooms/' + currentRoomId).update({ finishedPlayers: finished });
            
            // 승리자가 생겨 게임이 끝날 지 체크
            if(finished.length >= gameState.turnOrder.length - 1) {
                db.ref('rooms/' + currentRoomId).update({ status: 'waiting' });
            }

            // 👑 황금 입자 승급 연출
            const arena = document.getElementById('arena');
            for(let i=0; i<40; i++){
                const p = document.createElement('div'); p.className = 'particle';
                p.style.left = '50%'; p.style.top = '50%';
                p.style.width = p.style.height = (Math.random()*5+2)+'px';
                p.style.setProperty('--dx', (Math.random()-0.5)*700+'px'); p.style.setProperty('--dy', (Math.random()-0.5)*700+'px');
                arena.appendChild(p); setTimeout(()=>p.remove(), 1500);
            }
            log("ROYAL", `${gameState.players[id].name} has ascended!`);
        }

        function passTurn() {
            let ni = (gameState.turnIndex + 1) % gameState.turnOrder.length;
            while((gameState.finishedPlayers || []).includes(gameState.turnOrder[ni])) ni = (ni+1)%gameState.turnOrder.length;
            let pc = (gameState.passCount || 0) + 1;
            let activeCount = gameState.turnOrder.length - (gameState.finishedPlayers?.length || 0);
            let up = { turnIndex: ni, passCount: pc };
            if(pc >= activeCount - 1) { up.lastMove={rank:14,count:0,owner:""}; up.tableCards=[]; up.passCount=0; }
            db.ref('rooms/' + currentRoomId).update(up);
        }

        function triggerRevolution() { 
            db.ref('rooms/' + currentRoomId).update({ taxCancelled: true });
            log("REVOLUTION", "Tax is abolished for this era!"); 
        }

        function initNPCMode() { alert("NPC 모드는 현재 멀티플레이 로직과 동일하게 작동하며 혼자 연습 가능합니다."); checkAdminCreate(); }
        function log(u, m) { const g = document.getElementById('game-logs'); g.innerHTML += `<div><b>[${u}]</b> ${m}</div>`; g.scrollTop = g.scrollHeight; }
        function sendChat(e) { if(e.key==='Enter' && e.target.value.trim()){ log("CHAT", `${myName}: ${e.target.value}`); e.target.value=''; } }
        function cancelCreate() { document.getElementById('create-modal').style.display='none'; document.getElementById('lobby-modal').style.display='flex'; }
        function cancelJoin() { document.getElementById('join-modal').style.display='none'; }
    </script>
</body>
</html>
