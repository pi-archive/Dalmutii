<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti: Absolute Legacy</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        :root { 
            --gold: #d4af37; --gold-l: #f9e4b7; --dark: #0a0c10; 
            --panel: #161a20; --accent: #e74c3c; --table: #143324;
            --paper: #f4e4bc; --ink: #2c1810; --shadow: rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--dark); color: #eee; 
            font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* [심미적 오버레이] */
        .overlay { 
            position: fixed; inset: 0; background: radial-gradient(circle, rgba(22,26,32,0.95) 0%, rgba(0,0,0,0.99) 100%); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(30px); animation: modalFadeIn 0.8s ease-out;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        .modal { 
            background: var(--panel); padding: 70px; border-radius: 30px; 
            border: 4px solid var(--gold); text-align: center; width: 680px; 
            box-shadow: 0 0 150px rgba(0,0,0,1), inset 0 0 50px rgba(212,175,55,0.1);
            position: relative; overflow: hidden;
        }
        .modal h1 { font-family: 'Cinzel'; color: var(--gold); font-size: 4rem; margin-bottom: 35px; letter-spacing: 12px; text-shadow: 0 0 40px var(--gold); }

        /* [입력 필드] */
        .input-group { margin-bottom: 20px; }
        input[type="text"], input[type="password"] { 
            width: 100%; background: #000; border: 2px solid #333; color: var(--gold-l); 
            padding: 20px; border-radius: 15px; font-size: 1.1rem; transition: 0.4s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.2); }

        .btn-royal { 
            width: 100%; padding: 20px; background: var(--gold); color: #000; 
            font-family: 'Cinzel'; font-weight: 900; border: none; border-radius: 15px; 
            cursor: pointer; font-size: 1.2rem; transition: 0.4s; margin-top: 10px;
        }
        .btn-royal:hover { background: var(--gold-l); transform: scale(1.02); }

        /* [레이아웃 구성] */
        #sidebar-left { width: 260px; background: #080a0d; border-right: 2px solid #1a1a1a; display: flex; flex-direction: column; z-index: 10; }
        #arena-main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #143324 0%, #05070a 100%); position: relative; }
        #sidebar-right { width: 400px; background: #080a0d; border-left: 2px solid #1a1a1a; display: flex; flex-direction: column; z-index: 10; }

        /* [좌측: 계급 리스트 압축] */
        .sb-header { font-family: 'Cinzel'; text-align: center; color: var(--gold); padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; letter-spacing: 2px; background: #111; }
        #player-status-board { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .rank-item { 
            padding: 12px; background: #12151a; border-radius: 10px; border-left: 5px solid #333;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; transition: 0.3s;
        }
        .rank-item.active-turn { border-left-color: var(--gold); background: rgba(212, 175, 55, 0.15); transform: translateX(5px); }
        .rank-badge { color: var(--gold); font-size: 0.75rem; font-weight: bold; }

        /* [우측: 게임 로그 & 채팅 분리] */
        #log-section { height: 280px; display: flex; flex-direction: column; border-bottom: 3px solid #000; background: rgba(0,0,0,0.3); }
        #game-log { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.8rem; color: #999; line-height: 1.6; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: #050505; }
        #chat-log { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.95rem; color: #ccc; line-height: 1.6; }
        .chat-input-wrap { padding: 15px; background: #0c0e12; border-top: 1px solid #222; }

        /* [아레나 및 카드] */
        .game-table-inner { 
            width: 85%; height: 380px; border: 25px solid #2a1a10; border-radius: 200px; 
            background: var(--table); position: relative; box-shadow: inset 0 0 100px #000;
            display: flex; align-items: center; justify-content: center;
        }
        .card { 
            width: 95px; height: 140px; background: #fff; color: #000; border-radius: 12px; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 12px; 
            box-shadow: 0 8px 20px var(--shadow); cursor: pointer; border: 1px solid #ddd;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; font-weight: 900;
        }
        .card:hover { transform: translateY(-25px); z-index: 50; border-color: var(--gold); }
        .card.selected { transform: translateY(-50px); border: 5px solid var(--gold); box-shadow: 0 0 40px var(--gold); z-index: 100; }
        .card .val { font-size: 2rem; font-family: 'Cinzel'; line-height: 0.9; }
        .card .title { font-size: 0.75rem; color: var(--accent); text-align: center; border-top: 1px solid #eee; padding-top: 4px; }

        #hand-dock { height: 300px; background: #000; border-top: 5px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        #hand { display: flex; margin-top: 30px; padding-left: 50px; }
        #hand .card { margin-left: -50px; }
        #hand .card:first-child { margin-left: 0; }

        /* 로그 스타일 */
        .log-important { color: var(--gold-l); font-weight: bold; }
        .log-system { color: #5dade2; font-style: italic; }
        .log-rev { color: #e74c3c; font-weight: 900; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="overlay">
        <div class="modal">
            <h1>DALMUTI</h1>
            <div class="input-group">
                <input type="text" id="user-nick-input" placeholder="성함을 입력하소서">
            </div>
            <div class="input-group">
                <input type="password" id="admin-secret-input" placeholder="관리자 코드 (00123)">
            </div>
            <div style="display:flex; gap:15px; margin-bottom:20px;">
                <button class="btn-royal" style="flex:1;" onclick="reloadRooms()">성문 새로고침</button>
                <button class="btn-royal" style="flex:1; background:#2c3e50; color:#eee;" onclick="startNpcGame()">AI 훈련 모드</button>
            </div>
            <div id="room-list-box" style="max-height:200px; overflow-y:auto; margin-bottom:20px; border:2px solid #333; border-radius:10px; background:rgba(0,0,0,0.5);"></div>
            <button class="btn-royal" onclick="openCreateScreen()">새로운 영토 확장</button>
        </div>
    </div>

    <div id="create-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>CONSTRUCT</h1>
            <input type="text" id="new-room-title" placeholder="방 제목" style="margin-bottom:10px;">
            <input type="password" id="new-room-pass" placeholder="비밀번호" style="margin-bottom:20px;">
            <button class="btn-royal" onclick="finalizeRoomCreate()">건설 선포</button>
            <button class="btn-royal" style="background:#444; color:#fff;" onclick="closeAllModals()">취소</button>
        </div>
    </div>

    <div id="sidebar-left">
        <div class="sb-header">THE HIERARCHY</div>
        <div id="player-status-board"></div>
        <div style="padding:15px; border-top:1px solid #222;">
            <button class="btn-royal" style="background:#600; color:#fff; font-size:1rem;" onclick="location.reload()">성 탈출 (Exit)</button>
        </div>
    </div>

    <main id="arena-main">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="game-status-label" style="color:var(--gold); font-family:Cinzel; font-size:2rem; margin-bottom:30px; letter-spacing:4px;">PREPARING THE COURT...</div>
            
            <div id="host-action-zone" style="display:none; margin-bottom:20px;">
                <button class="btn-royal" style="width:300px;" onclick="startGameEngine()">대서사시의 시작</button>
            </div>

            <div class="game-table-inner" id="main-table">
                <div id="table-cards-display" style="display:flex; gap:12px;"></div>
            </div>
        </div>

        <div id="hand-dock">
            <div id="player-action-bar" style="display:none; gap:20px; margin-bottom:10px;">
                <button class="btn-royal" id="btn-rev" style="width:180px; background:#c0392b; color:white; display:none;" onclick="execRevolution()">⚠️ REVOLUTION!</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn-royal" style="width:160px;" onclick="playSelectedCards()">패 내놓기</button>
                    <button class="btn-royal" style="width:160px; background:#444; color:#eee;" onclick="passCurrentTurn()">턴 넘기기</button>
                </div>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <div id="sidebar-right">
        <div id="log-section">
            <div class="sb-header">GAME STATUS LOG</div>
            <div id="game-log"></div>
        </div>
        <div id="chat-section">
            <div class="sb-header" style="background:#050505;">SOCIAL COURT</div>
            <div id="chat-log"></div>
            <div class="chat-input-wrap">
                <input type="text" id="chat-input-field" placeholder="메시지를 전하소서..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            </div>
        </div>
    </div>

    <script>
        // [1] 환경 설정 및 변수
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            projectId: "gamee-10378"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const RANKS_KO = ["", "대달무티", "소달무티", "대주교", "수도원장", "기사", "기사종자", "상인", "자영농", "양치기", "요리사", "석공", "재봉사", "농노"];
        const MASTER_CODE = "00123";

        let myId = 'uid_' + Math.random().toString(36).substr(2, 10);
        let myName = "", currentRoomId = null, isHost = false, selectedIdxList = [], state = {}, isNpcMode = false;

        // [2] 방 관리 시스템 (Full Logic)
        function reloadRooms() {
            db.ref('rooms').on('value', snap => {
                const box = document.getElementById('room-list-box');
                box.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) { box.innerHTML = '<p style="color:#666; padding:15px;">비어있는 영토입니다.</p>'; return; }
                Object.keys(rooms).forEach(id => {
                    const r = rooms[id];
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.style.cursor = 'pointer';
                    div.innerHTML = `<div><b>🏰 ${r.title}</b></div><span style="color:var(--gold)">입성</span>`;
                    div.onclick = () => {
                        if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 먼저 입력하소서.");
                        currentRoomId = id;
                        const pw = prompt("암호를 입력하소서.");
                        if(pw === r.password) {
                            myName = document.getElementById('user-nick-input').value;
                            db.ref(`rooms/${id}/players/${myId}`).set({ name: myName, cards: [], rank: 99 });
                            db.ref(`rooms/${id}/turnOrder`).once('value', so => {
                                let order = so.val() || []; order.push(myId);
                                db.ref(`rooms/${id}/turnOrder`).set(order);
                            });
                            enterEmpireView();
                        } else alert("암호가 틀렸습니다.");
                    };
                    box.appendChild(div);
                });
            });
        }
        reloadRooms();

        function openCreateScreen() {
            if(document.getElementById('admin-secret-input').value !== MASTER_CODE) return alert("권한 코드가 틀렸습니다.");
            if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 입력하소서.");
            document.getElementById('create-screen').style.display = 'flex';
        }

        function finalizeRoomCreate() {
            const title = document.getElementById('new-room-title').value.trim();
            const pass = document.getElementById('new-room-pass').value.trim();
            if(!title || !pass) return alert("모든 항목을 입력하소서.");
            myName = document.getElementById('user-nick-input').value;
            currentRoomId = 'room_' + Date.now();
            isHost = true;
            db.ref('rooms/' + currentRoomId).set({
                host: myId, title: title, password: pass, status: 'waiting',
                players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0, revTrigger: false
            }).then(enterEmpireView);
        }

        // [3] 게임 엔진 - 카드 분배, 세금, 혁명 (Full Logic)
        function startGameEngine() {
            let deck = [];
            for(let i=1; i<=12; i++) { for(let j=0; j<i; j++) deck.push(i); }
            deck.push(13, 13); // 조커
            deck.sort(() => Math.random() - 0.5);

            let pIds = state.turnOrder;
            pIds.forEach(id => state.players[id].cards = []);
            
            let cardPtr = 0;
            while(deck.length > 0) {
                state.players[pIds[cardPtr % pIds.length]].cards.push(deck.pop());
                cardPtr++;
            }

            // 세금 징수 로직 (혁명 없을 때)
            if(!state.revTrigger && state.players[pIds[0]].rank !== 99 && state.status !== 'waiting') {
                const dalmutiId = pIds[0];
                const peasantId = pIds[pIds.length - 1];
                
                state.players[dalmutiId].cards.sort((a,b)=>b-a); // 나쁜 카드 방출
                state.players[peasantId].cards.sort((a,b)=>a-b); // 좋은 카드 상납

                const tax = state.players[peasantId].cards.splice(0, 2);
                const gift = state.players[dalmutiId].cards.splice(0, 2);
                
                state.players[dalmutiId].cards.push(...tax);
                state.players[peasantId].cards.push(...gift);
                writeGameLog("왕실", "세금 징수와 하사가 집행되었습니다.", "log-important");
            }

            state.status = 'playing';
            state.turnIndex = 0;
            state.tableCards = [];
            state.lastMove = { val: 14, count: 0, owner: "" };
            state.passCount = 0;
            state.revTrigger = false;
            syncData();
            writeGameLog("SYSTEM", "새로운 시대가 시작되었습니다!", "log-system");
        }

        // [4] UI 업데이트 및 렌더링
        function refreshEmpireUI() {
            const order = state.turnOrder || [];
            const board = document.getElementById('player-status-board');
            board.innerHTML = '';
            
            order.forEach((id, i) => {
                const p = state.players[id];
                const isMyTurn = state.turnIndex === i;
                board.innerHTML += `
                    <div class="rank-item ${isMyTurn?'active-turn':''}">
                        <div><b>${p.name}</b></div>
                        <div style="text-align:right;">
                            <span class="rank-badge">${RANKS_KO[i+1]}</span><br>
                            <small style="color:#666;">${p.cards.length} cards</small>
                        </div>
                    </div>`;
            });

            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            const myCards = (state.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((val, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${selectedIdxList.includes(i)?'selected':''}`;
                cardEl.innerHTML = `
                    <div class="val">${val===13?'🃏':val}</div>
                    <div class="title">${RANKS_KO[val]}</div>
                    <div class="val" style="align-self:flex-end; transform:rotate(180deg)">${val===13?'🃏':val}</div>`;
                cardEl.onclick = () => {
                    if(order[state.turnIndex] === myId) {
                        if(selectedIdxList.length > 0) {
                            let base = 13;
                            for(let idx of selectedIdxList) if(myCards[idx] !== 13) base = myCards[idx];
                            if(val !== base && val !== 13 && base !== 13) selectedIdxList = [];
                        }
                        const pos = selectedIdxList.indexOf(i);
                        if(pos > -1) selectedIdxList.splice(pos, 1);
                        else selectedIdxList.push(i);
                        refreshEmpireUI();
                    }
                };
                handDiv.appendChild(cardEl);
            });

            const tableDiv = document.getElementById('table-cards-display');
            tableDiv.innerHTML = '';
            (state.tableCards || []).forEach(v => {
                tableDiv.innerHTML += `
                    <div class="card" style="margin:0 5px; cursor:default; transform:none;">
                        <div class="val">${v===13?'🃏':v}</div>
                        <div class="title">${RANKS_KO[v]}</div>
                    </div>`;
            });

            const itIsMyTurn = order[state.turnIndex] === myId;
            document.getElementById('player-action-bar').style.display = state.status === 'playing' ? 'flex' : 'none';
            document.getElementById('btn-rev').style.display = (myCards.filter(x=>x===13).length === 2) ? 'block' : 'none';
            document.getElementById('host-action-zone').style.display = (isHost && state.status !== 'playing') ? 'block' : 'none';
            document.getElementById('game-status-label').innerText = itIsMyTurn ? "★ 귀하의 차례입니다 ★" : `${state.players[order[state.turnIndex]]?.name}의 턴...`;

            if(isNpcMode && !itIsMyTurn && state.status === 'playing') setTimeout(npcDecisionLogic, 1500);
        }

        // [5] 플레이어 액션 (내기, 패스, 혁명)
        function playSelectedCards() {
            const hand = state.players[myId].cards.sort((a,b)=>a-b);
            if(selectedIdxList.length === 0) return;
            
            let playVal = 13;
            for(let i of selectedIdxList) if(hand[i] !== 13) playVal = hand[i];
            const playCount = selectedIdxList.length;

            if(state.lastMove.owner === "" || (playVal < state.lastMove.val && playCount === state.lastMove.count)) {
                writeGameLog(myName, `[${RANKS_KO[playVal]}] ${playCount}장을 출격시켰습니다.`, "log-important");
                selectedIdxList.sort((a,b)=>b-a).forEach(idx => hand.splice(idx, 1));
                state.lastMove = { val: playVal, count: playCount, owner: myId };
                state.tableCards = Array(playCount).fill(playVal);
                state.passCount = 0; selectedIdxList = [];
                if(hand.length === 0) { 
                    state.status = 'waiting'; 
                    writeGameLog("승리", `${myName}님이 모든 패를 털었습니다!`, "log-important");
                }
                finishTurn();
            } else alert("조건이 맞지 않습니다. (더 높은 계급, 동일 수)");
        }

        function passCurrentTurn() {
            writeGameLog(myName, "패스하였습니다.");
            state.passCount++;
            if(state.passCount >= state.turnOrder.length - 1) {
                state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                writeGameLog("SYSTEM", "판이 초기화되었습니다.", "log-system");
            }
            finishTurn();
        }

        function execRevolution() {
            writeGameLog("🔥 혁명", "광대 2장으로 혁명이 발발했습니다! 세금이 취소됩니다.", "log-rev");
            state.revTrigger = true; 
            syncData();
        }

        // [6] AI 의사결정 로직 (Full Logic)
        function npcDecisionLogic() {
            const npcId = state.turnOrder[state.turnIndex];
            const hand = state.players[npcId].cards.sort((a,b)=>a-b);
            const last = state.lastMove;
            let moveSet = [];

            if(last.owner === "") {
                const target = hand[hand.length - 1]; // 큰 숫자(낮은 계급)부터 털기
                moveSet = hand.filter(v => v === target);
            } else {
                for(let v = 1; v < last.val; v++) {
                    const matches = hand.filter(x => x === v || x === 13);
                    if(matches.length >= last.count) { moveSet = matches.slice(0, last.count); break; }
                }
            }

            if(moveSet.length > 0) {
                const v = moveSet.find(x=>x!==13) || 13;
                moveSet.forEach(m => hand.splice(hand.indexOf(m), 1));
                state.lastMove = { val: v, count: moveSet.length, owner: npcId };
                state.tableCards = moveSet; state.passCount = 0;
                writeGameLog(state.players[npcId].name, `[${RANKS_KO[v]}] ${moveSet.length}장을 내놓았습니다.`, "log-important");
                if(hand.length === 0) state.status = 'waiting';
            } else {
                state.passCount++;
                writeGameLog(state.players[npcId].name, "패스.");
                if(state.passCount >= state.turnOrder.length - 1) {
                    state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                }
            }
            finishTurn();
        }

        // [7] 로그 및 소셜 기능
        function writeGameLog(user, msg, customClass = "") {
            const log = document.getElementById('game-log');
            log.innerHTML += `<div class="${customClass}">• <b>${user}</b>: ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input-field');
            if(!input.value.trim()) return;
            const log = document.getElementById('chat-log');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            log.innerHTML += `<div><small style="opacity:0.4;">[${time}]</small> <b>${myName}:</b> ${input.value}</div>`;
            log.scrollTop = log.scrollHeight;
            input.value = '';
        }

        // [8] 시스템 유틸리티
        function finishTurn() { 
            state.turnIndex = (state.turnIndex + 1) % state.turnOrder.length; 
            syncData(); 
        }

        function syncData() { 
            if(isNpcMode) refreshEmpireUI(); 
            else db.ref('rooms/' + currentRoomId).update(state); 
        }

        function enterEmpireView() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                state = snap.val(); 
                if(!state) return location.reload();
                isHost = (state.host === myId); 
                refreshEmpireUI();
            });
        }

        function startNpcGame() {
            myName = document.getElementById('user-nick-input').value || "고독한 영주";
            isNpcMode = true; isHost = true; currentRoomId = "local_sim";
            state = {
                status: 'waiting',
                players: {
                    [myId]: { name: myName, cards: [], rank: 1 },
                    'npc_1': { name: 'AI_대주교', cards: [], rank: 3 },
                    'npc_2': { name: 'AI_기사', cards: [], rank: 5 },
                    'npc_3': { name: 'AI_농노', cards: [], rank: 13 }
                },
                turnOrder: [myId, 'npc_1', 'npc_2', 'npc_3'],
                turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0, revTrigger: false
            };
            document.getElementById('lobby-screen').style.display = 'none';
            writeGameLog("SYSTEM", "AI 훈련 세션을 시작합니다.", "log-system");
            refreshEmpireUI();
        }

        function closeAllModals() {
            document.querySelectorAll('.overlay').forEach(el => { if(el.id !== 'lobby-screen') el.style.display='none'; });
        }
    </script>
</body>
</html>
