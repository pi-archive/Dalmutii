<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti: Final Legacy (Heavy Edition)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        :root { 
            --gold: #d4af37; --gold-l: #f9e4b7; --dark: #0a0c10; 
            --panel: #161a20; --accent: #e74c3c; --table: #143324;
            --paper: #f4e4bc; --ink: #2c1810; --shadow: rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--dark); color: #eee; 
            font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* [심미적 오버레이 및 배경] */
        .overlay { 
            position: fixed; inset: 0; background: radial-gradient(circle, rgba(22,26,32,0.95) 0%, rgba(0,0,0,0.99) 100%); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(30px); animation: modalFadeIn 0.8s ease-out;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        .modal { 
            background: var(--panel); padding: 70px; border-radius: 30px; 
            border: 4px solid var(--gold); text-align: center; width: 680px; 
            box-shadow: 0 0 150px rgba(0,0,0,1), inset 0 0 50px rgba(212,175,55,0.1);
            position: relative; overflow: hidden;
        }
        .modal::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(212,175,55,0.1), transparent 30%);
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .modal h1 { 
            font-family: 'Cinzel'; color: var(--gold); font-size: 4rem; 
            margin-bottom: 35px; letter-spacing: 12px; text-shadow: 0 0 40px var(--gold);
            position: relative;
        }

        /* [입력 필드 디자인 고도화] */
        .input-group { margin-bottom: 20px; position: relative; }
        input[type="text"], input[type="password"] { 
            width: 100%; background: #000; border: 2px solid #333; color: var(--gold-l); 
            padding: 22px; border-radius: 15px; font-size: 1.2rem; transition: 0.4s;
            box-shadow: inset 0 2px 10px #000;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 25px rgba(212,175,55,0.2); transform: translateY(-2px); }

        .btn-royal { 
            width: 100%; padding: 22px; background: var(--gold); color: #000; 
            font-family: 'Cinzel'; font-weight: 900; border: none; border-radius: 15px; 
            cursor: pointer; font-size: 1.4rem; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            margin-top: 15px; position: relative; overflow: hidden;
        }
        .btn-royal:hover { background: var(--gold-l); transform: scale(1.02); box-shadow: 0 10px 40px var(--gold); }
        .btn-royal:active { transform: scale(0.98); }

        /* [레이아웃 섹션] */
        #sidebar-left { width: 350px; background: #080a0d; border-right: 2px solid #1a1a1a; padding: 35px; display: flex; flex-direction: column; z-index: 10; }
        #arena-main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #143324 0%, #05070a 100%); position: relative; }
        #sidebar-right { width: 380px; background: #080a0d; border-left: 2px solid #1a1a1a; padding: 35px; display: flex; flex-direction: column; z-index: 10; }

        .game-table-inner { 
            width: 90%; height: 420px; border: 25px solid #2a1a10; border-radius: 210px; 
            background: var(--table); position: relative; box-shadow: inset 0 0 150px #000, 0 30px 60px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }

        /* [카드 디자인 - 최고 수준 퀄리티] */
        .card { 
            width: 100px; height: 150px; background: #fff; color: #000; border-radius: 12px; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px; 
            box-shadow: 0 10px 25px var(--shadow); cursor: pointer; border: 1px solid #ddd;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; font-weight: 900;
        }
        .card:hover { transform: translateY(-30px) rotate(2deg); z-index: 50; border-color: var(--gold); }
        .card.selected { transform: translateY(-60px); border: 5px solid var(--gold); box-shadow: 0 0 50px var(--gold); z-index: 100; }
        .card .val { font-size: 2.2rem; font-family: 'Cinzel'; line-height: 0.9; color: #111; }
        .card .title { font-size: 0.8rem; color: var(--accent); text-align: center; border-top: 2px double #eee; padding-top: 5px; letter-spacing: -0.5px; }

        #hand-dock { 
            height: 320px; background: linear-gradient(to top, #000 0%, #111 100%); border-top: 5px solid #222; 
            display: flex; flex-direction: column; align-items: center; padding: 30px; position: relative;
        }
        #hand { display: flex; margin-top: 25px; padding-left: 50px; }
        #hand .card { margin-left: -55px; }
        #hand .card:first-child { margin-left: 0; }

        /* [계급 및 상태 UI] */
        .rank-item { 
            padding: 20px; margin-bottom: 15px; background: #12151a; border-radius: 15px; 
            border-left: 8px solid #333; display: flex; justify-content: space-between; align-items: center; 
            transition: 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .rank-item.active-turn { 
            border-left-color: var(--gold); background: rgba(212, 175, 55, 0.15); 
            transform: scale(1.05); box-shadow: 0 0 30px rgba(212,175,55,0.2); 
        }

        #chat-log { 
            flex: 1; background: #000; border-radius: 15px; padding: 20px; 
            overflow-y: auto; font-size: 0.95rem; color: #aaa; border: 1px solid #222; 
            line-height: 1.6; scroll-behavior: smooth;
        }
        #chat-log b { color: var(--gold-l); }
        .log-important { color: var(--accent) !important; font-weight: bold; }
        .log-system { color: #5dade2 !important; font-style: italic; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="overlay">
        <div class="modal">
            <h1 style="position:relative; z-index:10;">DALMUTI</h1>
            <div class="input-group">
                <input type="text" id="user-nick-input" placeholder="귀하의 성함을 역사에 기록하소서">
            </div>
            <div class="input-group">
                <input type="password" id="admin-secret-input" placeholder="방장 권한 코드 (SECRET)">
            </div>
            <div style="display:flex; gap:15px; margin-bottom:25px;">
                <button class="btn-royal" style="flex:1;" onclick="reloadRooms()">성문 새로고침</button>
                <button class="btn-royal" style="flex:1; background:#2c3e50; color:#eee;" onclick="startNpcGame()">AI 훈련 모드</button>
            </div>
            <div id="room-list-box" style="max-height:220px; overflow-y:auto; margin-bottom:25px; border:2px solid #333; border-radius:15px; background:rgba(0,0,0,0.5);"></div>
            <button class="btn-royal" onclick="openCreateScreen()">새로운 영토 확장</button>
        </div>
    </div>

    <div id="create-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>CONSTRUCT</h1>
            <input type="text" id="new-room-title" placeholder="성의 명칭 (방 제목)">
            <input type="password" id="new-room-pass" placeholder="입성 비밀번호">
            <button class="btn-royal" onclick="finalizeRoomCreate()">건설 선포</button>
            <button class="btn-royal" style="background:#444; color:#fff;" onclick="closeAllModals()">계획 취소</button>
        </div>
    </div>

    <div id="join-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>GATEKEEPER</h1>
            <p id="join-info-text" style="color:var(--gold); font-size:1.6rem; margin-bottom:20px; font-weight:bold;"></p>
            <input type="password" id="join-pass-input" placeholder="암호를 대라">
            <button class="btn-royal" onclick="confirmJoinRequest()">신분 증명</button>
            <button class="btn-royal" style="background:#444; color:#fff;" onclick="closeAllModals()">물러나기</button>
        </div>
    </div>

    <div id="sidebar-left">
        <div style="background:var(--paper); color:var(--ink); padding:30px; border-radius:15px; flex:1; overflow-y:auto; box-shadow: inset 0 0 50px rgba(0,0,0,0.2); border: 1px solid #d4c4a1;">
            <h2 style="font-family:Cinzel; border-bottom:4px double var(--ink); padding-bottom:15px; margin-top:0; text-align:center;">THE HIERARCHY</h2>
            <div id="hierarchy-guide" style="font-size:1.1rem; line-height:2.3; font-weight:700;"></div>
        </div>
        <button class="btn-royal" style="background:#800; color:white; border:none; margin-top:25px;" onclick="location.reload()">성 탈출 (Quit)</button>
        <button id="host-destroy-btn" class="btn-royal" style="display:none; background:#222; color:var(--accent);" onclick="destroyRoom()">영토 폐기 (Host)</button>
    </div>

    <main id="arena-main">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="game-status-label" style="color:var(--gold); font-family:Cinzel; font-size:2.5rem; margin-bottom:40px; letter-spacing:6px; text-shadow: 0 0 20px rgba(212,175,55,0.5);">PREPARING THE COURT...</div>
            
            <div id="host-action-zone" style="display:none; margin-bottom:30px; animation: bounce 2s infinite;">
                <button class="btn-royal" style="width:320px;" onclick="startGameEngine()">대서사시의 시작 (START)</button>
            </div>

            <div class="game-table-inner" id="main-table">
                <div id="table-cards-display" style="display:flex; gap:15px;"></div>
            </div>
        </div>

        <div id="hand-dock">
            <div id="player-action-bar" style="display:none; gap:20px; margin-bottom:25px;">
                <button class="btn-royal" id="btn-rev" style="width:200px; background:#c0392b; color:white; display:none; animation: pulse 1s infinite;" onclick="execRevolution()">⚠️ REVOLUTION!</button>
                <div style="display:flex; gap:15px;">
                    <button class="btn-royal" style="width:180px;" onclick="playSelectedCards()">패 내놓기</button>
                    <button class="btn-royal" style="width:180px; background:#444; color:#eee;" onclick="passCurrentTurn()">턴 넘기기</button>
                </div>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <div id="sidebar-right">
        <h3 style="font-family:Cinzel; text-align:center; color:var(--gold); letter-spacing:4px; border-bottom:2px solid #222; padding-bottom:20px; margin-top:0;">COURT MEMBERS</h3>
        <div id="player-status-board" style="height:280px; overflow-y:auto; margin-bottom:20px;"></div>
        <div id="chat-log"></div>
        <input type="text" id="chat-input-field" style="width:100%; margin-top:20px; background:#000; border:1px solid #333; color:#fff; padding:18px; border-radius:12px;" placeholder="메시지를 전하소서..." onkeypress="if(event.key==='Enter') sendChatMessage()">
    </div>

    <script>
        // [사용자 고유 환경 설정]
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            projectId: "gamee-10378"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const RANKS_KO = ["", "대달무티", "소달무티", "대주교", "수도원장", "기사", "기사종자", "상인", "자영농", "양치기", "요리사", "석공", "재봉사", "농노"];
        const MASTER_CODE = "00123";

        let myId = 'uid_' + Math.random().toString(36).substr(2, 10);
        let myName = "", currentRoomId = null, isHost = false, selectedIdxList = [], state = {}, isNpcMode = false;

        // [초기화]
        const guide = document.getElementById('hierarchy-guide');
        for(let i=1; i<=13; i++) guide.innerHTML += `<div><span style="color:var(--ink); opacity:0.6;">[${i}]</span> ${RANKS_KO[i]}</div>`;

        // [방 관리 및 보안 로직 보강]
        function reloadRooms() {
            db.ref('rooms').on('value', snap => {
                const box = document.getElementById('room-list-box');
                box.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) { box.innerHTML = '<p style="color:#666; padding:20px;">건설된 성이 없습니다.</p>'; return; }
                Object.keys(rooms).forEach(id => {
                    const r = rooms[id];
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.style.cursor = 'pointer';
                    div.innerHTML = `<div><b>🏰 ${r.title}</b><br><small style="color:#555;">인원: ${Object.keys(r.players||{}).length}명</small></div><span style="color:var(--gold)">진입하기</span>`;
                    div.onclick = () => {
                        if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 먼저 입력하소서.");
                        currentRoomId = id;
                        document.getElementById('join-info-text').innerText = `[${r.title}] 성에 입장하시겠습니까?`;
                        document.getElementById('join-screen').style.display = 'flex';
                    };
                    box.appendChild(div);
                });
            });
        }
        reloadRooms();

        function openCreateScreen() {
            if(document.getElementById('admin-secret-input').value !== MASTER_CODE) return alert("권한 코드가 일치하지 않습니다.");
            if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 입력하소서.");
            document.getElementById('create-screen').style.display = 'flex';
        }

        function finalizeRoomCreate() {
            const title = document.getElementById('new-room-title').value.trim();
            const pass = document.getElementById('new-room-pass').value.trim();
            if(!title || !pass) return alert("성의 명칭과 암호를 모두 입력하소서.");
            myName = document.getElementById('user-nick-input').value;
            currentRoomId = 'room_' + Date.now();
            isHost = true;
            db.ref('rooms/' + currentRoomId).set({
                host: myId, title: title, password: pass, status: 'waiting',
                players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0, revTrigger: false
            }).then(enterEmpireView);
        }

        function confirmJoinRequest() {
            const inputPw = document.getElementById('join-pass-input').value;
            db.ref('rooms/' + currentRoomId).once('value', s => {
                if(s.val().password === inputPw) {
                    myName = document.getElementById('user-nick-input').value;
                    db.ref(`rooms/${currentRoomId}/players/${myId}`).set({ name: myName, cards: [], rank: 99 });
                    db.ref(`rooms/${currentRoomId}/turnOrder`).once('value', so => {
                        let order = so.val() || []; order.push(myId);
                        db.ref(`rooms/${currentRoomId}/turnOrder`).set(order);
                    });
                    enterEmpireView();
                } else alert("암호가 틀렸습니다. 성문을 열 수 없습니다.");
            });
        }

        // [AI 훈련 모드 보강]
        function startNpcGame() {
            myName = document.getElementById('user-nick-input').value || "고독한 영주";
            isNpcMode = true; isHost = true; currentRoomId = "local_simulation";
            state = {
                status: 'waiting',
                players: {
                    [myId]: { name: myName, cards: [], rank: 1 },
                    'npc_1': { name: 'AI_대주교', cards: [], rank: 3 },
                    'npc_2': { name: 'AI_기사단장', cards: [], rank: 5 },
                    'npc_3': { name: 'AI_굶주린농노', cards: [], rank: 13 }
                },
                turnOrder: [myId, 'npc_1', 'npc_2', 'npc_3'],
                turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0, revTrigger: false
            };
            document.getElementById('lobby-screen').style.display = 'none';
            writeGameLog("SYSTEM", "인공지능과의 훈련 모드를 시작합니다.", "log-system");
            refreshEmpireUI();
        }

        // [핵심 게임 엔진 - 풀 로직 보강]
        function startGameEngine() {
            // 80장 풀 덱 생성
            let deck = [];
            for(let i=1; i<=12; i++) { for(let j=0; j<i; j++) deck.push(i); }
            deck.push(13, 13); // 광대(조커) 2장
            deck.sort(() => Math.random() - 0.5);

            let pIds = state.turnOrder;
            pIds.forEach(id => state.players[id].cards = []);
            
            // 카드 분배
            let cardPtr = 0;
            while(deck.length > 0) {
                state.players[pIds[cardPtr % pIds.length]].cards.push(deck.pop());
                cardPtr++;
            }

            // [보강된 세금 및 계급 교환 로직]
            if(!state.revTrigger && state.players[pIds[0]].rank !== 99 && state.status !== 'waiting') {
                const dalmutiId = pIds[0];
                const peasantId = pIds[pIds.length - 1];
                
                // 정교한 정렬 및 교환
                state.players[dalmutiId].cards.sort((a,b)=>b-a); // 달무티는 나쁜 카드(큰 수)부터
                state.players[peasantId].cards.sort((a,b)=>a-b); // 농노는 좋은 카드(작은 수)부터

                const tax = state.players[peasantId].cards.splice(0, 2);
                const gift = state.players[dalmutiId].cards.splice(0, 2);
                
                state.players[dalmutiId].cards.push(...tax);
                state.players[peasantId].cards.push(...gift);
                
                writeGameLog("왕실 알림", "세금 징수와 하사가 완료되었습니다. (농노 -> 달무티: BEST 2장)");
            }

            state.status = 'playing';
            state.turnIndex = 0;
            state.tableCards = [];
            state.lastMove = { val: 14, count: 0, owner: "" };
            state.passCount = 0;
            state.revTrigger = false;
            syncData();
            writeGameLog("SYSTEM", "새로운 시대가 열렸습니다! 게임을 시작하십시오.", "log-system");
        }

        function refreshEmpireUI() {
            const order = state.turnOrder || [];
            const board = document.getElementById('player-status-board');
            board.innerHTML = '';
            
            order.forEach((id, i) => {
                const p = state.players[id];
                const isMyTurn = state.turnIndex === i;
                board.innerHTML += `<div class="rank-item ${isMyTurn?'active-turn':''}">
                    <div><b>${p.name}</b></div>
                    <div style="text-align:right;">
                        <span style="color:var(--gold); font-size:0.85rem;">[${RANKS_KO[i+1]}]</span><br>
                        <span style="color:#777; font-size:0.75rem;">${p.cards.length}장 보유</span>
                    </div>
                </div>`;
            });

            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            const myCards = (state.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((val, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${selectedIdxList.includes(i)?'selected':''}`;
                cardEl.innerHTML = `<div class="val">${val===13?'🃏':val}</div><div class="title">${RANKS_KO[val]}</div><div class="val" style="align-self:flex-end; transform:rotate(180deg)">${val===13?'🃏':val}</div>`;
                cardEl.onclick = () => {
                    if(order[state.turnIndex] === myId) {
                        // 다중 선택 로직: 동일 숫자 혹은 조커만 가능
                        if(selectedIdxList.length > 0) {
                            let base = 13;
                            for(let idx of selectedIdxList) if(myCards[idx] !== 13) base = myCards[idx];
                            if(val !== base && val !== 13 && base !== 13) selectedIdxList = [];
                        }
                        const pos = selectedIdxList.indexOf(i);
                        if(pos > -1) selectedIdxList.splice(pos, 1);
                        else selectedIdxList.push(i);
                        refreshEmpireUI();
                    }
                };
                handDiv.appendChild(cardEl);
            });

            const tableDiv = document.getElementById('table-cards-display');
            tableDiv.innerHTML = '';
            (state.tableCards || []).forEach(v => {
                tableDiv.innerHTML += `<div class="card" style="margin:0 5px; cursor:default; transform:none;"><div class="val">${v===13?'🃏':v}</div><div class="title">${RANKS_KO[v]}</div></div>`;
            });

            const itIsMyTurn = order[state.turnIndex] === myId;
            document.getElementById('player-action-bar').style.display = state.status === 'playing' ? 'flex' : 'none';
            document.getElementById('btn-rev').style.display = (myCards.filter(x=>x===13).length === 2) ? 'block' : 'none';
            document.getElementById('host-action-zone').style.display = (isHost && state.status !== 'playing') ? 'block' : 'none';
            document.getElementById('game-status-label').innerText = itIsMyTurn ? "★ 귀하의 차례입니다 ★" : `${state.players[order[state.turnIndex]]?.name}의 턴...`;

            if(isNpcMode && !itIsMyTurn && state.status === 'playing') setTimeout(npcDecisionLogic, 1800);
        }

        // [플레이어 동작 및 로그 기능 강화]
        function playSelectedCards() {
            const hand = state.players[myId].cards.sort((a,b)=>a-b);
            if(selectedIdxList.length === 0) return;
            
            let playVal = 13;
            for(let i of selectedIdxList) if(hand[i] !== 13) playVal = hand[i];
            const playCount = selectedIdxList.length;

            if(state.lastMove.owner === "" || (playVal < state.lastMove.val && playCount === state.lastMove.count)) {
                writeGameLog(myName, `[${RANKS_KO[playVal]}] ${playCount}장을 출격시켰습니다.`);
                selectedIdxList.sort((a,b)=>b-a).forEach(idx => hand.splice(idx, 1));
                state.lastMove = { val: playVal, count: playCount, owner: myId };
                state.tableCards = Array(playCount).fill(playVal);
                state.passCount = 0; selectedIdxList = [];
                if(hand.length === 0) { 
                    state.status = 'waiting'; 
                    writeGameLog("신분 해방", `${myName}님이 모든 패를 털고 승리하였습니다!`, "log-important");
                }
                finishTurn();
            } else {
                alert("현재 판보다 높은 계급(낮은 숫자)을 동일한 수만큼 내야 합니다.");
            }
        }

        function passCurrentTurn() {
            writeGameLog(myName, "패스를 선언하며 기회를 넘겼습니다.");
            state.passCount++;
            if(state.passCount >= state.turnOrder.length - 1) {
                state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                writeGameLog("SYSTEM", "모두가 물러나 판이 초기화되었습니다.", "log-system");
            }
            finishTurn();
        }

        function execRevolution() {
            writeGameLog("🔥 혁명", "광대 2장으로 혁명이 발발했습니다! 이번 판의 세금은 거부됩니다.", "log-important");
            state.revTrigger = true; 
            syncData();
        }

        function npcDecisionLogic() {
            const npcId = state.turnOrder[state.turnIndex];
            const hand = state.players[npcId].cards.sort((a,b)=>a-b);
            const last = state.lastMove;
            let moveSet = [];

            if(last.owner === "") {
                const target = hand[hand.length - 1]; 
                moveSet = hand.filter(v => v === target);
            } else {
                for(let v = 1; v < last.val; v++) {
                    const matches = hand.filter(x => x === v || x === 13);
                    if(matches.length >= last.count) { moveSet = matches.slice(0, last.count); break; }
                }
            }

            if(moveSet.length > 0) {
                const v = moveSet.find(x=>x!==13) || 13;
                moveSet.forEach(m => hand.splice(hand.indexOf(m), 1));
                state.lastMove = { val: v, count: moveSet.length, owner: npcId };
                state.tableCards = moveSet; state.passCount = 0;
                writeGameLog(state.players[npcId].name, `[${RANKS_KO[v]}] ${moveSet.length}장을 내놓았습니다.`);
                if(hand.length === 0) state.status = 'waiting';
            } else {
                state.passCount++;
                writeGameLog(state.players[npcId].name, "패스하였습니다.");
                if(state.passCount >= state.turnOrder.length - 1) {
                    state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                }
            }
            finishTurn();
        }

        // [유틸리티 및 시스템 로직]
        function writeGameLog(user, msg, customClass = "") {
            const log = document.getElementById('chat-log');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            log.innerHTML += `<div class="${customClass}"><small style="opacity:0.5;">[${time}]</small> <b>${user}:</b> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input-field');
            if(input.value.trim()) { writeGameLog(myName, input.value); input.value = ''; }
        }

        function finishTurn() { 
            state.turnIndex = (state.turnIndex + 1) % state.turnOrder.length; 
            syncData(); 
        }

        function syncData() { 
            if(isNpcMode) refreshEmpireUI(); 
            else db.ref('rooms/' + currentRoomId).update(state); 
        }

        function enterEmpireView() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                state = snap.val(); 
                if(!state) { alert("성이 무너졌습니다."); return location.reload(); }
                isHost = (state.host === myId); 
                refreshEmpireUI();
            });
        }

        function closeAllModals() { 
            document.querySelectorAll('.overlay').forEach(el => { if(el.id !== 'lobby-screen') el.style.display = 'none'; }); 
        }

        function destroyRoom() { 
            if(confirm("이 성을 지도에서 지우시겠습니까?")) db.ref('rooms/' + currentRoomId).remove(); 
        }
    </script>
</body>
</html>
