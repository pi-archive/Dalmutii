<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti: Final Legacy</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        :root { 
            --gold: #d4af37; --gold-l: #f9e4b7; --dark: #0a0c10; 
            --panel: #161a20; --accent: #e74c3c; --table: #143324;
            --paper: #f4e4bc; --ink: #2c1810;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: var(--dark); color: #eee; 
            font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* [보안 및 로비 UI] */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.97); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(20px); 
        }
        .modal { 
            background: var(--panel); padding: 60px; border-radius: 20px; 
            border: 3px solid var(--gold); text-align: center; width: 600px; 
            box-shadow: 0 0 150px rgba(0,0,0,1); 
        }
        .modal h1 { 
            font-family: 'Cinzel'; color: var(--gold); font-size: 3.5rem; 
            margin-bottom: 30px; letter-spacing: 8px; text-shadow: 0 0 20px var(--gold);
        }

        /* 모든 입력 필드 보안 마스킹 및 디자인 */
        input[type="text"], input[type="password"] { 
            width: 100%; background: #000; border: 1px solid #444; color: var(--gold-l); 
            padding: 20px; border-radius: 10px; margin-bottom: 15px; font-size: 1.1rem; outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        .btn-royal { 
            width: 100%; padding: 22px; background: var(--gold); color: #000; 
            font-family: 'Cinzel'; font-weight: 900; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 1.3rem; transition: 0.4s; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-royal:hover { background: var(--gold-l); transform: translateY(-5px); box-shadow: 0 10px 30px var(--gold); }
        
        /* [게임 아레나 레이아웃] */
        #sidebar-left { width: 340px; background: #0c0e12; border-right: 1px solid #222; padding: 30px; display: flex; flex-direction: column; }
        #arena-main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle, #1a3c2a 0%, #05070a 100%); position: relative; }
        #sidebar-right { width: 360px; background: #0c0e12; border-left: 1px solid #222; padding: 30px; display: flex; flex-direction: column; }

        .game-table-inner { 
            width: 85%; height: 400px; border: 18px solid #2a1a10; border-radius: 200px; 
            background: var(--table); position: relative; box-shadow: inset 0 0 120px #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* [카드 디자인 - 최초 퀄리티] */
        .card { 
            width: 90px; height: 135px; background: #fff; color: #000; border-radius: 12px; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #ccc; position: relative; font-weight: 900;
        }
        .card.selected { transform: translateY(-50px) scale(1.05); border: 4px solid var(--gold); box-shadow: 0 0 40px var(--gold); }
        .card .val { font-size: 1.8rem; font-family: 'Cinzel'; }
        .card .title { font-size: 0.7rem; color: var(--accent); text-align: center; line-height: 1.1; }

        #hand-dock { 
            height: 280px; background: rgba(0,0,0,0.95); border-top: 4px solid #222; 
            display: flex; flex-direction: column; align-items: center; padding: 30px; 
        }
        #hand { display: flex; margin-top: 20px; }
        #hand .card { margin-left: -45px; }
        #hand .card:first-child { margin-left: 0; }

        .rank-item { 
            padding: 15px; margin-bottom: 12px; background: #1a1e24; border-radius: 10px; 
            border-left: 6px solid #444; display: flex; justify-content: space-between; align-items: center; 
            transition: 0.3s;
        }
        .rank-item.active-turn { border-left-color: var(--gold); background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
    </style>
</head>
<body>

    <div id="lobby-screen" class="overlay">
        <div class="modal">
            <h1>DALMUTI</h1>
            <input type="text" id="user-nick-input" placeholder="당신의 이름을 역사에 남기소서">
            <input type="password" id="admin-secret-input" placeholder="방장 권한 코드를 입력하십시오 (SECRET)">
            
            <div style="display:flex; gap:15px; margin-bottom:25px;">
                <button class="btn-royal" style="flex:1; font-size:1.1rem;" onclick="reloadRooms()">성 목록 갱신</button>
                <button class="btn-royal" style="flex:1; background:#333; color:#eee; font-size:1.1rem;" onclick="startNpcGame()">인공지능 연습</button>
            </div>
            <div id="room-list-box" style="max-height:220px; overflow-y:auto; margin-bottom:25px; border:1px solid #333; border-radius:12px; background:rgba(0,0,0,0.4);"></div>
            <button class="btn-royal" onclick="openCreateScreen()">새로운 성(Room) 건설</button>
        </div>
    </div>

    <div id="create-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>NEW EMPIRE</h1>
            <input type="text" id="new-room-title" placeholder="성의 명칭(방 제목)">
            <input type="password" id="new-room-pass" placeholder="입장 암호(비밀번호) 설정">
            <button class="btn-royal" onclick="finalizeRoomCreate()">건설 선포</button>
            <button class="btn-royal" style="background:#444; color:#fff;" onclick="closeAllModals()">취소</button>
        </div>
    </div>

    <div id="join-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>GATEKEEPER</h1>
            <p id="join-info-text" style="color:var(--gold); font-size:1.4rem; font-weight:bold;"></p>
            <input type="password" id="join-pass-input" placeholder="암호를 입력하여 신분을 증명하라">
            <button class="btn-royal" onclick="confirmJoinRequest()">입장 허가</button>
            <button class="btn-royal" style="background:#444; color:#fff;" onclick="closeAllModals()">물러나기</button>
        </div>
    </div>

    <div id="sidebar-left">
        <div style="background:var(--paper); color:var(--ink); padding:25px; border-radius:12px; flex:1; overflow-y:auto; box-shadow: inset 0 0 40px rgba(0,0,0,0.2);">
            <h2 style="font-family:Cinzel; border-bottom:3px solid var(--ink); padding-bottom:15px; margin-top:0;">THE RANKS</h2>
            <div id="hierarchy-guide" style="font-size:1rem; line-height:2.2;"></div>
        </div>
        <button class="btn-royal" style="background:#800; color:white; border:none; margin-top:20px;" onclick="location.reload()">성 탈출 (Surrender)</button>
        <button id="host-destroy-btn" class="btn-royal" style="display:none; background:#333; color:var(--accent);" onclick="destroyRoom()">성 파괴 (Host)</button>
    </div>

    <main id="arena-main">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="game-status-label" style="color:var(--gold); font-family:Cinzel; font-size:2rem; margin-bottom:35px; letter-spacing:4px; text-shadow: 0 0 15px rgba(212,175,55,0.4);">WAITING FOR PLAYERS...</div>
            
            <div id="host-action-zone" style="display:none; margin-bottom:25px;">
                <button class="btn-royal" style="width:280px;" onclick="startGameEngine()">새 시대의 서막 (START)</button>
            </div>

            <div class="game-table-inner">
                <div id="table-cards-display" style="display:flex;"></div>
            </div>
        </div>

        <div id="hand-dock">
            <div id="player-action-bar" style="display:none; gap:20px; margin-bottom:20px;">
                <button class="btn-royal" id="btn-rev" style="width:180px; background:#c0392b; display:none;" onclick="execRevolution()">REVOLUTION!</button>
                <div style="display:flex; gap:12px;">
                    <button class="btn-royal" style="width:150px;" onclick="playSelectedCards()">패 내기</button>
                    <button class="btn-royal" style="width:150px; background:#444; color:#eee;" onclick="passCurrentTurn()">패스</button>
                </div>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <div id="sidebar-right">
        <h3 style="font-family:Cinzel; text-align:center; color:var(--gold); letter-spacing:3px; border-bottom:1px solid #333; padding-bottom:15px;">COURT MEMBERS</h3>
        <div id="player-status-board" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
        <div id="chat-log" style="height:220px; background:rgba(0,0,0,0.6); border-radius:12px; padding:18px; overflow-y:auto; font-size:0.95rem; color:#ccc; border:1px solid #222;"></div>
        <input type="text" id="chat-input-field" style="width:100%; margin-top:15px; background:#000; border:1px solid #444; color:#fff; padding:15px; border-radius:8px;" placeholder="메시지를 입력하소서..." onkeypress="if(event.key==='Enter') sendChatMessage()">
    </div>

    <script>
        // [5. 게임 엔진 및 모든 로직 - 압축 없이 풀 이식]
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            projectId: "gamee-10378"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const RANKS_DATA = ["", "Greater Dalmuti", "Lesser Dalmuti", "Archbishop", "Abbot", "Knight", "Cavalier", "Merchant", "Yeoman", "Shepherd", "Cook", "Mason", "Seamstress", "Peasant"];
        let myId = 'uid_' + Math.random().toString(36).substr(2, 10);
        let myName = "", currentRoomId = null, isHost = false, selectedIdxList = [], state = {}, isNpcMode = false;
        const MASTER_AUTH_CODE = "00123";

        // 계급 가이드 초기화
        const guide = document.getElementById('hierarchy-guide');
        for(let i=1; i<=13; i++) guide.innerHTML += `<div><b>${i}</b>. ${RANKS_DATA[i]}</div>`;

        // [방 관리 및 보안]
        function reloadRooms() {
            db.ref('rooms').on('value', snap => {
                const box = document.getElementById('room-list-box');
                box.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) { box.innerHTML = '<p style="color:#555; text-align:center; padding:20px;">건설된 성이 없습니다.</p>'; return; }
                Object.keys(rooms).forEach(id => {
                    const r = rooms[id];
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.style.cursor = 'pointer';
                    div.innerHTML = `<div><b>🏰 ${r.title}</b><br><small style="color:#777;">인원: ${Object.keys(r.players||{}).length}명</small></div><span style="color:var(--gold)">성문 입장</span>`;
                    div.onclick = () => {
                        if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 입력하십시오.");
                        currentRoomId = id;
                        document.getElementById('join-info-text').innerText = `[${r.title}] 성에 들어가시겠습니까?`;
                        document.getElementById('join-screen').style.display = 'flex';
                    };
                    box.appendChild(div);
                });
            });
        }
        reloadRooms();

        function openCreateScreen() {
            const auth = document.getElementById('admin-secret-input').value;
            if(auth !== MASTER_AUTH_CODE) return alert("방장 권한 코드가 올바르지 않습니다.");
            if(!document.getElementById('user-nick-input').value.trim()) return alert("성함을 먼저 입력하십시오.");
            document.getElementById('create-screen').style.display = 'flex';
        }

        function finalizeRoomCreate() {
            const title = document.getElementById('new-room-title').value.trim();
            const pass = document.getElementById('new-room-pass').value.trim();
            if(!title || !pass) return alert("성의 명칭과 암호를 정하셔야 합니다.");
            
            myName = document.getElementById('user-nick-input').value;
            currentRoomId = 'room_' + Date.now();
            isHost = true;
            isNpcMode = false;

            db.ref('rooms/' + currentRoomId).set({
                host: myId, title: title, password: pass, status: 'waiting',
                players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0
            }).then(enterEmpireView);
        }

        function confirmJoinRequest() {
            const inputPw = document.getElementById('join-pass-input').value;
            db.ref('rooms/' + currentRoomId).once('value', s => {
                if(s.val().password === inputPw) {
                    myName = document.getElementById('user-nick-input').value;
                    db.ref(`rooms/${currentRoomId}/players/${myId}`).set({ name: myName, cards: [], rank: 99 });
                    db.ref(`rooms/${currentRoomId}/turnOrder`).once('value', so => {
                        let order = so.val() || [];
                        order.push(myId);
                        db.ref(`rooms/${currentRoomId}/turnOrder`).set(order);
                    });
                    enterEmpireView();
                } else alert("성문 암호가 틀렸습니다.");
            });
        }

        // [NPC 모드 로직 - 최초 로직 100% 보존]
        function startNpcGame() {
            myName = document.getElementById('user-nick-input').value.trim() || "익명의 귀족";
            isNpcMode = true; isHost = true; currentRoomId = "local_simulation";
            state = {
                status: 'waiting',
                players: {
                    [myId]: { name: myName, cards: [], rank: 1 },
                    'npc_1': { name: 'AI_기사단장', cards: [], rank: 5 },
                    'npc_2': { name: 'AI_상인연합', cards: [], rank: 9 },
                    'npc_3': { name: 'AI_굶주린농노', cards: [], rank: 13 }
                },
                turnOrder: [myId, 'npc_1', 'npc_2', 'npc_3'],
                turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0
            };
            document.getElementById('lobby-screen').style.display = 'none';
            refreshEmpireUI();
        }

        // [핵심 게임 엔진 - 세금, 혁명, 턴제 로직]
        function startGameEngine() {
            // [최초 로직: 80장 풀 덱 생성 및 셔플]
            let deck = [];
            for(let i=1; i<=12; i++) {
                for(let j=0; j<i; j++) deck.push(i);
            }
            deck.push(13, 13); // 조커 2장
            deck.sort(() => Math.random() - 0.5);

            let pIds = state.turnOrder;
            pIds.forEach(id => state.players[id].cards = []);
            
            // 공평하게 카드 분배
            let cardPtr = 0;
            while(deck.length > 0) {
                state.players[pIds[cardPtr % pIds.length]].cards.push(deck.pop());
                cardPtr++;
            }

            // [최초 로직: 세금 징수 (Taxation)]
            // 달무티와 농노의 계급이 확정된 두 번째 판부터 작동하는 로직
            if(state.players[pIds[0]].rank === 1 && state.status !== 'waiting') {
                const dalmutiId = pIds[0];
                const peasantId = pIds[pIds.length-1];
                
                // 카드 정렬 (세금 징수를 위해)
                state.players[dalmutiId].cards.sort((a,b)=>b-a); // 달무티는 큰 수(낮은 계급)부터
                state.players[peasantId].cards.sort((a,b)=>a-b); // 농노는 작은 수(높은 계급)부터

                // 농노는 가장 좋은 카드(작은 수) 2장 상납, 달무티는 가장 나쁜 카드(큰 수) 2장 하사
                const taxCards = state.players[peasantId].cards.splice(0, 2);
                const giftCards = state.players[dalmutiId].cards.splice(0, 2);
                
                state.players[dalmutiId].cards.push(...taxCards);
                state.players[peasantId].cards.push(...giftCards);
                
                writeGameLog("👑 왕실 알림", "세금 징수와 하사가 집행되었습니다.");
            }

            state.status = 'playing';
            state.turnIndex = 0;
            state.tableCards = [];
            state.lastMove = { val: 14, count: 0, owner: "" };
            state.passCount = 0;
            syncData();
        }

        function refreshEmpireUI() {
            const order = state.turnOrder || [];
            const board = document.getElementById('player-status-board');
            board.innerHTML = '';
            
            order.forEach((id, i) => {
                const p = state.players[id];
                const isMyTurn = state.turnIndex === i;
                board.innerHTML += `<div class="rank-item ${isMyTurn?'active-turn':''}">
                    <div><b>${p.name}</b></div>
                    <div style="text-align:right;">
                        <span style="color:var(--gold); font-size:0.8rem;">[${RANKS_DATA[i+1]}]</span><br>
                        <span style="color:#888; font-size:0.75rem;">${p.cards.length}장 남음</span>
                    </div>
                </div>`;
            });

            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            const myCards = (state.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((val, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${selectedIdxList.includes(i)?'selected':''}`;
                cardEl.innerHTML = `<div class="val">${val}</div><div class="title">${RANKS_DATA[val]}</div><div class="val" style="align-self:flex-end; transform:rotate(180deg)">${val}</div>`;
                cardEl.onclick = () => {
                    if(order[state.turnIndex] === myId) {
                        // 동일한 숫자 또는 조커(13)만 다중 선택 가능
                        if(selectedIdxList.length > 0) {
                            const firstVal = myCards[selectedIdxList[0]];
                            if(val !== firstVal && val !== 13 && firstVal !== 13) {
                                selectedIdxList = [];
                            }
                        }
                        const pos = selectedIdxList.indexOf(i);
                        if(pos > -1) selectedIdxList.splice(pos, 1);
                        else selectedIdxList.push(i);
                        refreshEmpireUI();
                    }
                };
                handDiv.appendChild(cardEl);
            });

            const tableDiv = document.getElementById('table-cards-display');
            tableDiv.innerHTML = '';
            (state.tableCards || []).forEach(v => {
                tableDiv.innerHTML += `<div class="card" style="margin:0 8px;"><div class="val">${v}</div><div class="title">${RANKS_DATA[v]}</div></div>`;
            });

            const itIsMyTurn = order[state.turnIndex] === myId;
            document.getElementById('player-action-bar').style.display = state.status === 'playing' ? 'flex' : 'none';
            document.getElementById('btn-rev').style.display = (myCards.filter(x=>x===13).length === 2) ? 'block' : 'none';
            document.getElementById('host-action-zone').style.display = (isHost && state.status !== 'playing') ? 'block' : 'none';
            document.getElementById('host-destroy-btn').style.display = (isHost && !isNpcMode) ? 'block' : 'none';
            document.getElementById('game-status-label').innerText = itIsMyTurn ? "★ 당신의 차례입니다 ★" : `${state.players[order[state.turnIndex]]?.name}의 턴...`;

            if(isNpcMode && !itIsMyTurn && state.status === 'playing') setTimeout(npcDecisionLogic, 1600);
        }

        function playSelectedCards() {
            const hand = state.players[myId].cards.sort((a,b)=>a-b);
            if(selectedIdxList.length === 0) return;
            
            let playVal = hand[selectedIdxList[0]];
            // 만약 조커가 섞여있다면, 조커가 아닌 카드의 숫자를 기준으로 함
            for(let i of selectedIdxList) { if(hand[i] !== 13) playVal = hand[i]; }
            
            const playCount = selectedIdxList.length;

            if(state.lastMove.owner === "" || (playVal < state.lastMove.val && playCount === state.lastMove.count)) {
                selectedIdxList.sort((a,b)=>b-a).forEach(idx => hand.splice(idx, 1));
                state.lastMove = { val: playVal, count: playCount, owner: myId };
                state.tableCards = Array(playCount).fill(playVal);
                state.passCount = 0;
                selectedIdxList = [];
                if(hand.length === 0) { state.status = 'waiting'; alert("영광스러운 승리입니다!"); }
                finishTurn();
            } else {
                alert("현재 판보다 더 높은 계급(낮은 숫자)을 동일한 장수만큼 내야 합니다.");
            }
        }

        function passCurrentTurn() {
            state.passCount++;
            if(state.passCount >= state.turnOrder.length - 1) {
                state.tableCards = [];
                state.lastMove = { val: 14, count: 0, owner: "" };
                state.passCount = 0;
                writeGameLog("시스템", "모두가 패스하여 판이 초기화되었습니다.");
            }
            finishTurn();
        }

        function npcDecisionLogic() {
            const npcId = state.turnOrder[state.turnIndex];
            const hand = state.players[npcId].cards.sort((a,b)=>a-b);
            const last = state.lastMove;
            let moveSet = [];

            if(last.owner === "") {
                // 선 플레이어일 때: 가장 낮은 계급(큰 수) 중 장수가 많은 것부터
                const targetVal = hand[hand.length - 1];
                moveSet = hand.filter(v => v === targetVal);
            } else {
                // 대항 플레이어일 때: 현재보다 낮은 숫자 중 낼 수 있는 최소 장수 세트 찾기
                for(let v = 1; v < last.val; v++) {
                    const matches = hand.filter(x => x === v);
                    if(matches.length >= last.count) {
                        moveSet = matches.slice(0, last.count);
                        break;
                    }
                }
            }

            if(moveSet.length > 0) {
                const v = moveSet[0];
                moveSet.forEach(m => hand.splice(hand.indexOf(m), 1));
                state.lastMove = { val: v, count: moveSet.length, owner: npcId };
                state.tableCards = moveSet;
                state.passCount = 0;
                if(hand.length === 0) state.status = 'waiting';
            } else {
                state.passCount++;
                if(state.passCount >= state.turnOrder.length - 1) {
                    state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                }
            }
            finishTurn();
        }

        function execRevolution() {
            writeGameLog("⚠️ 혁명", "광대 2장으로 혁명이 일어났습니다! 세금이 면제됩니다.");
            state.revolutionTriggered = true;
            syncData();
        }

        function finishTurn() {
            state.turnIndex = (state.turnIndex + 1) % state.turnOrder.length;
            syncData();
        }

        function syncData() {
            if(isNpcMode) refreshEmpireUI();
            else db.ref('rooms/' + currentRoomId).update(state);
        }

        function enterEmpireView() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                state = snap.val();
                if(!state) { alert("성이 무너졌습니다."); location.reload(); return; }
                isHost = (state.host === myId);
                refreshEmpireUI();
            });
        }

        function closeAllModals() { document.querySelectorAll('.overlay').forEach(el => { if(el.id !== 'lobby-screen') el.style.display = 'none'; }); }
        function destroyRoom() { if(confirm("이 성을 정말 파괴하시겠습니까?")) db.ref('rooms/' + currentRoomId).remove(); }
        function writeGameLog(user, msg) {
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div><b>[${user}]</b> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        function sendChatMessage() {
            const input = document.getElementById('chat-input-field');
            if(input.value.trim()) { writeGameLog(myName, input.value); input.value = ''; }
        }
    </script>
</body>
</html>
