<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalmuti Elite: Golden Ascension</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        :root { --gold: #dfbb69; --parchment: #f4e4bc; --table-green: #1a3c2a; --bg: #0a0c10; --card-red: #d32f2f; --ink: #2c1810; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: var(--bg); color: #eee; font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; }

        /* [Elite UI Modals] */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.5s; }
        .modal { background: #1a1f26; padding: 35px; border-radius: 12px; border: 2px solid var(--gold); text-align: center; width: 500px; box-shadow: 0 0 50px #000; }
        .modal h1 { font-family: 'Cinzel'; color: var(--gold); margin-bottom: 25px; letter-spacing: 3px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; font-family: 'Cinzel'; margin-bottom: 15px; outline: none; }
        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: var(--gold); color: black; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #room-list { background: rgba(0,0,0,0.3); height: 200px; overflow-y: auto; border: 1px solid #333; margin: 15px 0; }
        .room-item { background: #222; padding: 12px; margin: 5px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; cursor: pointer; }

        /* [Game Arena & Cards] */
        #left-panel { width: 300px; background: #111; border-right: 2px solid #222; padding: 15px; display: flex; flex-direction: column; }
        .parchment { flex: 1; background: var(--parchment); color: var(--ink); padding: 25px; border-radius: 3px; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); overflow-y: auto; border: 1px solid #c5b38a; }
        
        #main-game { flex: 1; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.5s; }
        #main-game.active { opacity: 1; pointer-events: all; }
        #arena { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a22 0%, #05070a 100%); position: relative; overflow: hidden; }
        .table { width: 92%; height: 350px; background: var(--table-green); border: 14px solid #2a1a10; border-radius: 180px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 25px 60px #000; background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png'); }

        .card { width: 90px; height: 130px; background: white; color: black; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; font-weight: 900; position: relative; transition: 0.2s; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card.selected { transform: translateY(-35px) !important; border: 3px solid var(--gold); box-shadow: 0 0 25px var(--gold); }
        .played-card { animation: toss 0.4s ease-out forwards; margin: 0 4px; }
        @keyframes toss { from { transform: scale(1.6) translateY(250px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #player-area { height: 240px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; padding: 15px; border-top: 2px solid #333; }
        #player-area.my-turn { border-top: 2px solid var(--gold); background: rgba(223, 187, 105, 0.05); }
        #hand { display: flex; margin-top: 20px; }
        #hand .card { margin-left: -40px; }

        /* [Tax & Rank Info] */
        .rank-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; background: #333; color: #fff; margin-left: 5px; font-family: 'Cinzel'; text-transform: uppercase; }
        .rank-1 { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); } /* Dalmuti */
        
        /* 📈 승급 애니메이션 클래스 */
        @keyframes ascend {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(223,187,105,0); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(223,187,105,1); background: rgba(223,187,105,0.2); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(223,187,105,0.5); }
        }
        .ascended { animation: ascend 1.5s ease-out; }

        /* 흩뿌려지는 황금 가루 효과 */
        .particle { position: absolute; background: var(--gold); border-radius: 50%; pointer-events: none; opacity: 0; animation: particle-fade 2s ease-out forwards; }
        @keyframes particle-fade { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); } }
    </style>
</head>
<body>

    <div id="lobby-modal" class="overlay">
        <div class="modal">
            <h1>DALMUTI ELITE</h1>
            <input type="text" id="nick-input" placeholder="ENTER YOUR NOBLE NAME" maxlength="10">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="createRoom()">CREATE COURT</button>
                <button class="btn secondary" onclick="initNPCMode()">NPC PRACTICE</button>
            </div>
            <div id="room-list"></div>
        </div>
    </div>

    <div id="tax-modal" class="overlay" style="display:none; opacity:0">
        <div class="modal">
            <h1 id="tax-title">Royal Taxation</h1>
            <p id="tax-desc" style="color:#ccc;"></p>
            <button class="btn" onclick="closeTaxModal()">ACCEPT</button>
        </div>
    </div>

    <div id="left-panel">
        <div class="parchment">
            <h2 style="font-family:Cinzel">The Feudal Orders</h2>
            <div id="rule-box"></div>
        </div>
    </div>

    <main id="main-game">
        <div id="arena">
            <div id="status-text" style="position:absolute; top:20px; color:var(--gold); font-size:1.3rem; font-family:Cinzel;">WAITING...</div>
            <div id="host-zone" style="display:none;"><button class="btn start-btn" onclick="requestStart()">START NEXT ROUND</button></div>
            <div class="table"><div id="table-cards" style="display:flex;"></div></div>
        </div>
        <div id="player-area">
            <div id="play-btns" style="display:none;">
                <button class="btn" id="btn-rev" style="display:none; width:130px; border-color:red; color:red;" onclick="triggerRevolution()">REVOLUTION!</button>
                <button class="btn" id="btn-submit" style="display:inline-block; width:130px;" onclick="submitMove()">SUBMIT</button>
                <button class="btn" id="btn-pass" style="display:inline-block; width:130px; margin-left:10px;" onclick="passTurn()">PASS</button>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <aside id="right-panel" style="width:320px; background:#0a0c10; border-left:2px solid #222; padding:15px; display:flex; flex-direction:column;">
        <h3 style="color:var(--gold); font-family:Cinzel; text-align:center;">SOCIAL STATUS</h3>
        <div id="p-list" style="margin-top:10px; position:relative;"></div> <div id="game-logs" style="flex:1; overflow-y:auto; font-size:0.8rem; color:#888; margin-top:10px;"></div>
        <input type="text" id="chat-box" placeholder="Chat..." style="background:#000; border:1px solid #333; color:white; padding:10px; margin-top:5px;" onkeypress="sendChat(event)">
    </aside>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            authDomain: "gamee-10378.firebaseapp.com",
            projectId: "gamee-10378",
            storageBucket: "gamee-10378.firebasestorage.app",
            messagingSenderId: "959963691936",
            appId: "1:959963691936:web:9efdefbcc3efb86bbec2c5",
            measurementId: "G-3LQ3TD6XW7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const JOBS = ["", "Greater Dalmuti", "Lesser Dalmuti", "Archbishop", "Abbot", "Knight", "Cavalier", "Merchant", "Yeoman", "Shepherd", "Cook", "Mason", "Seamstress", "Peasant"];
        let myId = 'u_' + Math.random().toString(36).substr(2, 9);
        let myName = "", currentRoomId = null, isHost = false, selected = [], gameState = {}, isNPCMode = false;

        // 룰북 초기화
        const rb = document.getElementById('rule-box');
        for(let i=1; i<=13; i++) rb.innerHTML += `<div class="rule-item">${i}. ${JOBS[i]}</div>`;

        // 로비 감시
        db.ref('rooms').on('value', snap => {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            const rooms = snap.val();
            if(!rooms) return;
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                if(r.status === 'waiting') {
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    div.innerHTML = `<span>🏰 ${r.hostName}'s Court</span><span>JOIN</span>`;
                    div.onclick = () => joinRoom(id);
                    list.appendChild(div);
                }
            });
        });

        function createRoom() {
            myName = document.getElementById('nick-input').value.trim();
            if(!myName) return alert("이름을 입력하세요.");
            currentRoomId = 'court_' + Date.now();
            isHost = true;
            db.ref('rooms/' + currentRoomId).set({
                hostId: myId, hostName: myName, status: 'waiting',
                players: { [myId]: { name: myName, cards: [], rank: 0 } },
                turnOrder: [myId]
            });
            db.ref('rooms/' + currentRoomId).onDisconnect().remove();
            enterGame();
        }

        function joinRoom(id) {
            myName = document.getElementById('nick-input').value.trim();
            if(!myName) return alert("이름을 입력하세요.");
            currentRoomId = id; isHost = false;
            db.ref('rooms/' + id + '/players/' + myId).set({ name: myName, cards: [], rank: 0 });
            enterGame();
        }

        function enterGame() {
            document.getElementById('lobby-modal').style.display = 'none';
            document.getElementById('main-game').classList.add('active');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                gameState = snap.val();
                if(!gameState) return;
                updateUI();
            });
        }

        // 🃏 게임 시작 및 세금 로직
        function requestStart() {
            let deck = [];
            for(let i=1; i<=12; i++) for(let j=0; j<i; j++) deck.push(i);
            deck.push(13, 13); // 어리광대 2장
            deck.sort(() => Math.random() - 0.5);

            let pIds = Object.keys(gameState.players);
            // 4인 미만 봇 추가
            while(pIds.length < 4) {
                const nid = 'npc_' + pIds.length;
                gameState.players[nid] = { name: "Bot " + pIds.length, cards: [], isNPC: true, rank: 0 };
                pIds.push(nid);
            }

            // 카드 분배
            pIds.forEach(id => gameState.players[id].cards = []);
            let pIdx = 0;
            while(deck.length > 0) {
                gameState.players[pIds[pIdx % pIds.length]].cards.push(deck.pop());
                pIdx++;
            }

            // 계급 순서 정렬 (기존 rank 기준, 없으면 랜덤)
            pIds.sort((a,b) => (gameState.players[a].rank || 99) - (gameState.players[b].rank || 99));

            // 세금 징수 로직 (Elite 룰 반영)
            if(gameState.status === 'playing') {
                applyTaxation(pIds);
            }

            db.ref('rooms/' + currentRoomId).update({
                players: gameState.players,
                turnOrder: pIds,
                turnIndex: 0,
                status: 'playing',
                tableCards: [],
                lastMove: { rank: 14, count: 0, owner: "" },
                passCount: 0,
                finishedPlayers: null // 탈출 명단 초기화
            });
            log("SYSTEM", "New Round with Taxation...");
        }

        function applyTaxation(pIds) {
            const dalmuti = pIds[0];
            const peasant = pIds[pIds.length-1];
            
            // 농노 -> 달무티 (가장 좋은 카드 2장: 낮은 숫자)
            gameState.players[peasant].cards.sort((a,b) => a-b);
            const tax1 = gameState.players[peasant].cards.splice(0, 2);
            gameState.players[dalmuti].cards.push(...tax1);
            
            // 달무티 -> 농노 (아무 카드 2장: 높은 숫자 자동 선택)
            gameState.players[dalmuti].cards.sort((a,b) => b-a);
            const gift1 = gameState.players[dalmuti].cards.splice(0, 2);
            gameState.players[peasant].cards.push(...gift1);

            log("TAX", "Lord took 2 cards from Peasant.");
        }

        function updateUI() {
            if(!gameState.players) return;
            const pIds = gameState.turnOrder || [];
            
            // 사회 계급 리스트 (디자인 보존 및 애니메이션 추가)
            const pList = document.getElementById('p-list'); pList.innerHTML = '';
            pIds.forEach((id, i) => {
                const p = gameState.players[id];
                const active = gameState.turnIndex === i;
                const div = document.createElement('div');
                div.id = `player-${id}`; // 애니메이션 타겟팅용
                div.style = `padding:10px; margin-bottom:5px; background:${active?'rgba(223,187,105,0.15)':'#111'}; border-left:4px solid ${active?'var(--gold)':'transparent'}; transition: all 0.5s ease-out; position: relative;`;
                div.innerHTML = `
                    <b>${p.name}</b> <span class="rank-tag rank-${i+1}">${JOBS[i+1]}</span>
                    <div style="font-size:0.7rem; color:#666;">Cards: ${(p.cards||[]).length}</div>
                `;
                pList.appendChild(div);
            });

            // 카드 핸드
            const h = document.getElementById('hand'); h.innerHTML = '';
            const myCards = (gameState.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((n, i) => {
                const c = document.createElement('div');
                c.className = `card ${selected.includes(i)?'selected':''}`;
                c.innerHTML = `<div style="font-size:1.4rem">${n}</div><div style="font-size:0.6rem; color:var(--card-red)">${JOBS[n]}</div>`;
                c.onclick = () => {
                    if(pIds[gameState.turnIndex] === myId) {
                        if(selected.length > 0 && myCards[selected[0]] !== n) selected = [];
                        const pos = selected.indexOf(i); if(pos > -1) selected.splice(pos,1); else selected.push(i);
                        updateUI();
                    }
                };
                h.appendChild(c);
            });

            // 혁명 버튼 체크 (어리광대 2장)
            const jokerCount = myCards.filter(n => n === 13).length;
            document.getElementById('btn-rev').style.display = (jokerCount === 2) ? 'inline-block' : 'none';

            // 테이블 및 버튼
            const tc = document.getElementById('table-cards'); tc.innerHTML = '';
            (gameState.tableCards || []).forEach(n => {
                tc.innerHTML += `<div class="card played-card"><div style="font-size:2rem; margin:auto;">${n}</div></div>`;
            });

            const myTurn = pIds[gameState.turnIndex] === myId;
            document.getElementById('player-area').className = myTurn ? 'my-turn' : '';
            document.getElementById('play-btns').style.display = gameState.status === 'playing' ? 'block' : 'none';
            document.getElementById('btn-submit').disabled = !myTurn || selected.length === 0;
            document.getElementById('btn-pass').disabled = !myTurn || gameState.lastMove.owner === "";
            document.getElementById('host-zone').style.display = (isHost && gameState.status !== 'playing') ? 'block' : 'none';
            document.getElementById('status-text').innerText = gameState.players[gameState.turnOrder[gameState.turnIndex]].name + "'s Turn";
        }

        function triggerRevolution() {
            log("REVOLUTION", `${myName} has declared REVOLUTION! Taxes are cancelled!`);
            db.ref('rooms/' + currentRoomId).update({ taxCancelled: true });
        }

        function submitMove() {
            const myCards = gameState.players[myId].cards.sort((a,b)=>a-b);
            const r = myCards[selected[0]], c = selected.length;
            
            if(gameState.lastMove.owner === "" || (r < gameState.lastMove.rank && count === gameState.lastMove.count)) {
                // 카드 제거
                const cardsLeft = [...myCards];
                selected.sort((a,b)=>b-a).forEach(idx => cardsLeft.splice(idx, 1));
                selected = [];

                // 승리 체크 및 연출 호출 (핵심 업데이트)
                if(cardsLeft.length === 0) {
                    checkWin(myId);
                }

                db.ref('rooms/' + currentRoomId).update({
                    turnIndex: (gameState.turnIndex + 1) % gameState.turnOrder.length,
                    lastMove: { rank: r, count: c, owner: myId },
                    tableCards: Array(c).fill(r),
                    passCount: 0,
                    [`players/${myId}/cards`]: cardsLeft
                });
            }
        }

        // 👑 승리 및 신분 승급 연출 (핵심 업데이트)
        function checkWin(id) {
            if (!gameState.finishedPlayers) gameState.finishedPlayers = [];
            if (!gameState.finishedPlayers.includes(id)) {
                const newList = [...(gameState.finishedPlayers || []), id];
                db.ref('rooms/' + currentRoomId).update({ finishedPlayers: newList });
                
                triggerAscensionEffects(id, newList.length); // 화려한 연출 실행
                log("ASCENSION", `${gameState.players[id].name} has finished! (Rank ${newList.length})`);
            }
        }

        function triggerAscensionEffects(id, position) {
            // 1. 황금 가루 폭발 효과
            const arena = document.getElementById('arena');
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const x = arena.offsetWidth / 2;
                const y = arena.offsetHeight / 2;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 400 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 400 + 'px');
                p.style.animationDelay = Math.random() * 0.5 + 's';
                arena.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }

            // 2. 우측 계급 리스트 승급 애니메이션
            const playerEntry = document.getElementById(`player-${id}`);
            if(playerEntry) {
                playerEntry.classList.add('ascended'); // 황금 오라 효과
                setTimeout(() => playerEntry.classList.remove('ascended'), 1500);
                
                // 순서 재배치 로직 (새 라운드 시작 시 적용되지만 연출용으로 살짝 움직임)
                // 실제 계급 갈아치우기는 방장이 requestStart를 누를 때 finalizeRanks()를 통해 처리
            }
        }

        function passTurn() {
            let nextIndex = (gameState.turnIndex + 1) % gameState.turnOrder.length;
            let pCount = (gameState.passCount || 0) + 1;
            let updates = { turnIndex: nextIndex, passCount: pCount };
            if(pCount >= gameState.turnOrder.length - 1) {
                updates.lastMove = { rank: 14, count: 0, owner: "" };
                updates.tableCards = []; updates.passCount = 0;
            }
            db.ref('rooms/' + currentRoomId).update(updates);
            log(myName, "PASS");
        }

        function log(u, m) {
            const g = document.getElementById('game-logs');
            g.innerHTML += `<div><b style="color:var(--gold)">[${u}]</b> ${m}</div>`;
            g.scrollTop = g.scrollHeight;
        }

        function sendChat(e) { if(e.key==='Enter' && e.target.value.trim()){ log("CHAT", `${myName}: ${e.target.value}`); e.target.value=''; } }
    </script>
</body>
</html>
