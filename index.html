<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti: Elite Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        :root { 
            --gold: #dfbb69; --gold-bright: #ffedbc; --parchment: #f4e4bc; 
            --table-green: #1a3c2a; --bg: #0a0c10; --card-red: #d32f2f; 
            --ink: #2c1810; --danger: #ff4444;
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: var(--bg); color: #eee; font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; }

        /* [Security & Lobby Modals] */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal { background: #1a1f26; padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 550px; box-shadow: 0 0 80px #000; }
        .modal h1 { font-family: 'Cinzel'; color: var(--gold); margin-bottom: 20px; letter-spacing: 5px; font-size: 2.2rem; }

        input { width: 100%; background: #000; border: 1px solid #444; color: var(--gold); padding: 15px; border-radius: 6px; margin-bottom: 12px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); }

        .btn { display: block; width: 100%; padding: 16px; margin: 8px 0; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: var(--gold); color: black; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; background: #222; cursor: pointer; border: 1px solid #444; color: #888; }
        .tab.active { background: var(--gold); color: black; border-color: var(--gold); font-weight: bold; }

        #room-list { background: rgba(0,0,0,0.6); height: 200px; overflow-y: auto; border: 1px solid #333; margin-bottom: 15px; border-radius: 8px; }
        .room-item { background: #222; padding: 12px; margin: 8px; border-left: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        /* [Game Arena & UI] */
        #main-game { flex: 1; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.8s; }
        #main-game.active { opacity: 1; pointer-events: all; }
        #arena { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a22 0%, #05070a 100%); position: relative; }

        .table { width: 90%; height: 350px; background: var(--table-green); border: 15px solid #2a1a10; border-radius: 180px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 50px #000; }
        
        /* [Card Styling] */
        .card { width: 85px; height: 125px; background: white; color: black; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; font-weight: 900; position: relative; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.selected { transform: translateY(-35px) !important; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        .played-card { animation: toss 0.5s forwards; margin: 0 5px; }
        @keyframes toss { from { transform: scale(2) translateY(300px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #player-area { height: 250px; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; padding: 15px; border-top: 3px solid #333; }
        #hand { display: flex; margin-top: 20px; }
        #hand .card { margin-left: -40px; }
        #hand .card:first-child { margin-left: 0; }

        #left-panel { width: 300px; background: #0c0e12; border-right: 2px solid #222; display: flex; flex-direction: column; }
        .parchment { background: var(--parchment); color: var(--ink); margin: 15px; padding: 20px; flex: 1; border-radius: 3px; overflow-y: auto; }
        #right-panel { width: 320px; background: #0a0c10; border-left: 2px solid #222; padding: 15px; display: flex; flex-direction: column; }
        #p-list { flex: 1; overflow-y: auto; }
        #game-logs { height: 180px; background: #000; font-size: 0.8rem; color: #888; padding: 10px; border: 1px solid #222; margin-bottom: 10px; overflow-y: auto; }

        .rank-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; background: #444; color: #fff; margin-left: 5px; font-family: 'Cinzel'; }
        .rank-1 { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="lobby-modal" class="overlay">
        <div class="modal">
            <h1>THE DALMUTI</h1>
            <input type="text" id="nick-input" placeholder="이름을 입력하세요">
            <input type="password" id="admin-pw" placeholder="방장 전용 생성 암호 (00123)">
            
            <div class="tab-container">
                <div class="tab active" id="tab-multi" onclick="switchTab('multi')">다인용 성 목록</div>
                <div class="tab" id="tab-npc" onclick="switchTab('npc')">NPC 연습장</div>
            </div>

            <div id="room-list"></div>

            <button class="btn" id="create-btn" onclick="checkAdminCreate()">새로운 성 건설하기 (방장 전용)</button>
        </div>
    </div>

    <div id="create-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h1>성 건설 (방 만들기)</h1>
            <input type="text" id="room-title" placeholder="성의 이름 (방 제목)">
            <input type="password" id="entry-pw" placeholder="성문 비밀번호 (비밀번호 가려짐)">
            <button class="btn" onclick="finalizeRoom()">건설 승인</button>
            <button class="btn" style="border:none;" onclick="cancelCreate()">취소</button>
        </div>
    </div>

    <div id="join-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h1>성문 입장</h1>
            <p id="target-room-name" style="color:var(--gold); font-size: 1.2rem;"></p>
            <input type="password" id="input-join-pw" placeholder="비밀번호를 입력하세요 (가려짐)">
            <button class="btn" onclick="verifyJoin()">입장</button>
            <button class="btn" style="border:none;" onclick="cancelJoin()">취소</button>
        </div>
    </div>

    <div id="left-panel">
        <div class="parchment">
            <h2 style="font-family:Cinzel; border-bottom:1px solid #000;">계급도</h2>
            <div id="rule-box" style="font-size:0.9rem; line-height:1.6;"></div>
        </div>
        <div style="padding: 15px;">
            <button class="btn btn-danger" onclick="leaveRoom()">성에서 탈출하기</button>
            <button id="host-destroy-btn" class="btn btn-danger" style="display:none; background:#400;" onclick="destroyRoom()">성 파괴 (방장)</button>
        </div>
    </div>

    <main id="main-game">
        <div id="arena">
            <div id="status-text" style="position:absolute; top:20px; color:var(--gold); font-size:1.3rem; font-family:Cinzel;">WAITING...</div>
            <div id="host-zone" style="display:none; position:absolute; top:80px;">
                <button class="btn" style="width:200px;" onclick="requestStart()">시대 시작</button>
            </div>
            <div class="table"><div id="table-cards" style="display:flex;"></div></div>
        </div>
        <div id="player-area">
            <div id="play-btns" style="display:none;">
                <button class="btn" id="btn-rev" style="display:none; width:150px; border-color:red; color:red; margin-bottom:5px;" onclick="triggerRevolution()">REVOLUTION!</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn" id="btn-submit" style="width:130px;" onclick="submitMove()">카드 내기</button>
                    <button class="btn" id="btn-pass" style="width:130px;" onclick="passTurn()">패스</button>
                </div>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <aside id="right-panel">
        <h3 style="color:var(--gold); text-align:center; font-family:Cinzel;">SOCIAL RANK</h3>
        <div id="p-list"></div>
        <div id="game-logs"></div>
        <input type="text" id="chat-box" placeholder="메시지 전송..." style="background:#000; border:1px solid #333; color:white; padding:12px;" onkeypress="sendChat(event)">
    </aside>

    <script>
        // 1. Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            authDomain: "gamee-10378.firebaseapp.com",
            projectId: "gamee-10378",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            storageBucket: "gamee-10378.firebasestorage.app",
            messagingSenderId: "959963691936",
            appId: "1:959963691936:web:9efdefbcc3efb86bbec2c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 변수 설정
        const JOBS = ["", "Greater Dalmuti", "Lesser Dalmuti", "Archbishop", "Abbot", "Knight", "Cavalier", "Merchant", "Yeoman", "Shepherd", "Cook", "Mason", "Seamstress", "Peasant"];
        let myId = 'u_' + Math.random().toString(36).substr(2, 9);
        let myName = "", currentRoomId = null, isHost = false, selected = [], gameState = {}, currentTab = 'multi', isNPCMode = false;

        const rb = document.getElementById('rule-box');
        for(let i=1; i<=13; i++) rb.innerHTML += `<div>${i}. ${JOBS[i]}</div>`;

        // 3. 로비 및 탭 전환
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-multi').classList.toggle('active', tab === 'multi');
            document.getElementById('tab-npc').classList.toggle('active', tab === 'npc');
            document.getElementById('create-btn').style.display = (tab === 'multi') ? 'block' : 'none';
            renderRoomList();
        }

        function renderRoomList() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            
            if (currentTab === 'npc') {
                const npcRoom = document.createElement('div');
                npcRoom.className = 'room-item';
                npcRoom.innerHTML = `<span>🤖 NPC 연습 경기장</span><span>[입장]</span>`;
                npcRoom.onclick = startNPCGame;
                list.appendChild(npcRoom);
                return;
            }

            db.ref('rooms').on('value', snap => {
                if(currentTab !== 'multi') return;
                list.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) return;
                Object.keys(rooms).forEach(id => {
                    const r = rooms[id];
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    div.innerHTML = `<span>🏰 ${r.roomTitle} (${Object.keys(r.players || {}).length}명)</span><span>🔒</span>`;
                    div.onclick = () => {
                        currentRoomId = id;
                        document.getElementById('target-room-name').innerText = r.roomTitle;
                        document.getElementById('join-modal').style.display = 'flex';
                    };
                    list.appendChild(div);
                });
            });
        }
        renderRoomList();

        // 4. 방 생성 및 보안
        function checkAdminCreate() {
            if(document.getElementById('admin-pw').value !== "00123") return alert("방장 인증 코드가 틀렸습니다.");
            if(!document.getElementById('nick-input').value.trim()) return alert("이름을 입력하세요.");
            document.getElementById('lobby-modal').style.display = 'none';
            document.getElementById('create-modal').style.display = 'flex';
        }

        function finalizeRoom() {
            const title = document.getElementById('room-title').value.trim();
            const pw = document.getElementById('entry-pw').value.trim();
            if(!title || !pw) return alert("제목과 비밀번호를 모두 입력하세요.");
            
            myName = document.getElementById('nick-input').value;
            currentRoomId = 'court_' + Date.now();
            isHost = true;
            isNPCMode = false;

            db.ref('rooms/' + currentRoomId).set({
                hostId: myId, hostName: myName, roomTitle: title, password: pw,
                status: 'waiting', players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], taxCancelled: false, tableCards: [], lastMove: { rank: 14, count: 0, owner: "" }
            }).then(enterGame);
        }

        function verifyJoin() {
            db.ref(`rooms/${currentRoomId}`).once('value', s => {
                const r = s.val();
                if(document.getElementById('input-join-pw').value === r.password) {
                    myName = document.getElementById('nick-input').value.trim() || "Noble";
                    db.ref(`rooms/${currentRoomId}/players/${myId}`).set({ name: myName, cards: [], rank: 99 });
                    db.ref(`rooms/${currentRoomId}/turnOrder`).once('value', so => {
                        let o = so.val() || []; o.push(myId);
                        db.ref(`rooms/${currentRoomId}/turnOrder`).set(o);
                    });
                    enterGame();
                } else alert("비밀번호가 틀렸습니다.");
            });
        }

        // 5. NPC 모드 엔진
        function startNPCGame() {
            myName = document.getElementById('nick-input').value.trim() || "Player";
            isNPCMode = true;
            isHost = true;
            currentRoomId = "npc_room";
            
            gameState = {
                status: 'waiting',
                players: {
                    [myId]: { name: myName, cards: [], rank: 1 },
                    'npc1': { name: '컴퓨터1', cards: [], rank: 2 },
                    'npc2': { name: '컴퓨터2', cards: [], rank: 3 },
                    'npc3': { name: '컴퓨터3', cards: [], rank: 4 }
                },
                turnOrder: [myId, 'npc1', 'npc2', 'npc3'],
                turnIndex: 0,
                tableCards: [],
                lastMove: { rank: 14, count: 0, owner: "" },
                passCount: 0
            };
            
            document.getElementById('lobby-modal').style.display = 'none';
            document.getElementById('main-game').classList.add('active');
            updateUI();
        }

        // 6. 게임 코어 로직
        function requestStart() {
            let deck = [];
            for(let i=1; i<=12; i++) for(let j=0; j<i; j++) deck.push(i);
            deck.push(13, 13);
            deck.sort(() => Math.random() - 0.5);

            let pIds = Object.keys(gameState.players);
            pIds.forEach(id => { gameState.players[id].cards = []; });

            let idx = 0;
            while(deck.length > 0) {
                gameState.players[pIds[idx % pIds.length]].cards.push(deck.pop());
                idx++;
            }

            gameState.status = 'playing';
            gameState.turnIndex = 0;
            gameState.tableCards = [];
            gameState.lastMove = { rank: 14, count: 0, owner: "" };
            gameState.passCount = 0;

            if(isNPCMode) updateUI();
            else db.ref('rooms/' + currentRoomId).update(gameState);
        }

        function updateUI() {
            const pIds = gameState.turnOrder || [];
            const pList = document.getElementById('p-list'); pList.innerHTML = '';
            
            pIds.forEach((id, i) => {
                const p = gameState.players[id];
                const active = gameState.turnIndex === i;
                pList.innerHTML += `<div style="padding:10px; margin-bottom:5px; background:${active?'rgba(223,187,105,0.2)':'#111'}; border-radius:5px;">
                    <b>${p.name}</b> <span class="rank-tag rank-${i+1}">${JOBS[i+1]}</span>
                    <div style="font-size:0.7rem;">카드: ${p.cards.length}장</div></div>`;
            });

            const h = document.getElementById('hand'); h.innerHTML = '';
            const myCards = (gameState.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((n, i) => {
                const c = document.createElement('div');
                c.className = `card ${selected.includes(i)?'selected':''}`;
                c.innerHTML = `<div>${n}</div><div style="color:red; font-size:0.6rem;">${JOBS[n]}</div><div>${n}</div>`;
                c.onclick = () => {
                    if(pIds[gameState.turnIndex] === myId) {
                        const val = myCards[i];
                        if(selected.length > 0 && val !== myCards[selected[0]] && val !== 13) selected = [];
                        const pos = selected.indexOf(i);
                        if(pos > -1) selected.splice(pos, 1); else selected.push(i);
                        updateUI();
                    }
                };
                h.appendChild(c);
            });

            const tc = document.getElementById('table-cards'); tc.innerHTML = '';
            (gameState.tableCards || []).forEach(n => {
                tc.innerHTML += `<div class="card played-card"><div>${n}</div><div style="font-size:0.6rem;">${JOBS[n]}</div><div>${n}</div></div>`;
            });

            const isMyTurn = pIds[gameState.turnIndex] === myId;
            document.getElementById('play-btns').style.display = gameState.status === 'playing' ? 'block' : 'none';
            document.getElementById('btn-submit').disabled = !isMyTurn || selected.length === 0;
            document.getElementById('btn-pass').disabled = !isMyTurn || gameState.lastMove.owner === "";
            document.getElementById('host-zone').style.display = (isHost && gameState.status !== 'playing') ? 'block' : 'none';
            document.getElementById('host-destroy-btn').style.display = isHost ? 'block' : 'none';
            document.getElementById('status-text').innerText = isMyTurn ? "당신의 차례!" : `${gameState.players[pIds[gameState.turnIndex]].name}의 차례`;

            // NPC 턴 처리
            if(isNPCMode && !isMyTurn && gameState.status === 'playing') {
                setTimeout(npcPlay, 1500);
            }
        }

        function submitMove() {
            const hand = gameState.players[myId].cards.sort((a,b)=>a-b);
            let r = hand[selected[0]];
            const c = selected.length;

            if(gameState.lastMove.owner === "" || (r < gameState.lastMove.rank && c === gameState.lastMove.count)) {
                selected.sort((a,b)=>b-a).forEach(idx => hand.splice(idx, 1));
                selected = [];
                gameState.lastMove = { rank: r, count: c, owner: myId };
                gameState.tableCards = Array(c).fill(r);
                gameState.passCount = 0;
                nextTurn();
            } else alert("낼 수 없는 카드입니다.");
        }

        function passTurn() {
            gameState.passCount++;
            if(gameState.passCount >= gameState.turnOrder.length - 1) {
                gameState.tableCards = [];
                gameState.lastMove = { rank: 14, count: 0, owner: "" };
                gameState.passCount = 0;
            }
            nextTurn();
        }

        function nextTurn() {
            gameState.turnIndex = (gameState.turnIndex + 1) % gameState.turnOrder.length;
            if(gameState.players[myId].cards.length === 0 && gameState.status === 'playing') {
                gameState.status = 'waiting';
                alert("당신이 승리했습니다!");
            }
            if(isNPCMode) updateUI();
            else db.ref('rooms/' + currentRoomId).update(gameState);
        }

        function npcPlay() {
            const npcId = gameState.turnOrder[gameState.turnIndex];
            const hand = gameState.players[npcId].cards.sort((a,b)=>a-b);
            const last = gameState.lastMove;
            
            let possible = [];
            if(last.owner === "") {
                // 아무거나 내기
                const r = hand[hand.length-1];
                const count = hand.filter(x => x === r).length;
                possible = Array(count).fill(r);
            } else {
                // 족보에 맞는 카드 찾기
                for(let r=1; r<last.rank; r++) {
                    const count = hand.filter(x => x === r).length;
                    if(count >= last.count) {
                        possible = Array(last.count).fill(r);
                        break;
                    }
                }
            }

            if(possible.length > 0) {
                const r = possible[0];
                possible.forEach(val => {
                    const idx = hand.indexOf(val);
                    hand.splice(idx, 1);
                });
                gameState.lastMove = { rank: r, count: possible.length, owner: npcId };
                gameState.tableCards = possible;
                gameState.passCount = 0;
                log("MOVE", `${gameState.players[npcId].name}: ${r}을(를) ${possible.length}장 냈습니다.`);
            } else {
                gameState.passCount++;
                log("PASS", `${gameState.players[npcId].name} 패스.`);
                if(gameState.passCount >= gameState.turnOrder.length - 1) {
                    gameState.tableCards = [];
                    gameState.lastMove = { rank: 14, count: 0, owner: "" };
                    gameState.passCount = 0;
                }
            }
            nextTurn();
        }

        // 유틸리티 함수
        function enterGame() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            document.getElementById('main-game').classList.add('active');
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                gameState = snap.val();
                if(!gameState) { alert("성이 무너졌습니다."); location.reload(); return; }
                isHost = (gameState.hostId === myId);
                updateUI();
            });
        }

        function leaveRoom() { if(confirm("퇴장하시겠습니까?")) location.reload(); }
        function destroyRoom() { if(confirm("성을 파괴하시겠습니까?")) db.ref('rooms/' + currentRoomId).remove(); }
        function cancelCreate() { document.getElementById('create-modal').style.display='none'; document.getElementById('lobby-modal').style.display='flex'; }
        function cancelJoin() { document.getElementById('join-modal').style.display='none'; }
        function log(u, m) { const g = document.getElementById('game-logs'); g.innerHTML += `<div>[${u}] ${m}</div>`; g.scrollTop = g.scrollHeight; }
        function sendChat(e) { if(e.key==='Enter' && e.target.value.trim()){ log("CHAT", `${myName}: ${e.target.value}`); e.target.value=''; } }
    </script>
</body>
</html>
