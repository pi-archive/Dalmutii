<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALMUTI: The Feudal Era</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        :root { 
            --gold: #c5a059; --gold-light: #f1d392; --accent: #ffd700;
            --bg-dark: #0f1115; --panel-bg: #1a1d23;
            --card-white: #fdfdfd; --card-border: #2c1810;
            --danger: #e74c3c; --success: #2ecc71;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: #e0e0e0; 
            font-family: 'Noto Serif KR', serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* [Modern Glassmorphism Overlay] */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); transition: 0.5s;
        }
        .modal { 
            background: linear-gradient(145deg, #1e2229, #15181d);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.3);
            text-align: center; width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal h1 { 
            font-family: 'Cinzel'; color: var(--gold); margin-bottom: 30px; 
            letter-spacing: 6px; font-size: 2.8rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* [Input & Button Styles] */
        input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #3d4451; 
            color: var(--gold-light); padding: 15px; border-radius: 10px; margin-bottom: 15px;
            font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; border: 1px solid #3d4451; background: transparent; 
            color: #888; cursor: pointer; border-radius: 8px; font-family: 'Cinzel'; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        .primary-btn { 
            width: 100%; padding: 16px; background: var(--gold); border: none; 
            color: #000; font-family: 'Cinzel'; font-weight: 900; cursor: pointer; 
            border-radius: 10px; font-size: 1.1rem; letter-spacing: 2px; transition: 0.3s;
        }
        .primary-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* [Room List] */
        #room-list { height: 180px; overflow-y: auto; margin: 15px 0; padding: 5px; }
        .room-card { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .room-card:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }

        /* [Game Arena & Layout] */
        #left-panel { width: 320px; background: var(--panel-bg); border-right: 1px solid #2d343e; padding: 20px; display: flex; flex-direction: column; }
        #arena { flex: 1; background: radial-gradient(circle at center, #1e3a2e 0%, #0a0c10 100%); position: relative; }
        .table-rim { 
            width: 85%; height: 380px; border: 12px solid #2a1a10; border-radius: 200px;
            background: #143324; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 100px #000, 0 20px 40px rgba(0,0,0,0.6);
        }

        /* [Card Design] */
        .card { 
            width: 85px; height: 125px; background: var(--card-white); border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; flex-direction: column;
            justify-content: space-between; padding: 10px; cursor: pointer; transition: 0.3s cubic-bezier(.25,.8,.25,1);
            border: 1px solid #ddd; position: relative;
        }
        .card .val { font-size: 1.4rem; font-weight: 900; color: #1a1a1a; font-family: 'Cinzel'; }
        .card .title { font-size: 0.6rem; color: var(--danger); font-weight: bold; text-align: center; }
        .card.selected { transform: translateY(-30px); border: 3px solid var(--accent); box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4); }
        .played-card { animation: cardEnter 0.5s ease-out forwards; margin: 0 5px; }
        @keyframes cardEnter { from { opacity: 0; transform: scale(1.5) translateY(200px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* [Player UI] */
        #player-dock { 
            height: 260px; background: #111418; border-top: 2px solid #2d343e;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        #hand { display: flex; justify-content: center; margin-top: 30px; height: 130px; }
        #hand .card { margin-left: -40px; }
        #hand .card:first-child { margin-left: 0; }

        .rank-badge { 
            font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; 
            background: #333; color: #fff; text-transform: uppercase; font-family: 'Cinzel';
        }
        .rank-gold { background: linear-gradient(to bottom, #d4af37, #aa841e); color: #000; font-weight: bold; }

        #right-panel { width: 340px; background: var(--panel-bg); border-left: 1px solid #2d343e; padding: 20px; display: flex; flex-direction: column; }
        #log-box { flex: 1; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 0.85rem; color: #aaa; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="overlay">
        <div class="modal">
            <h1>DALMUTI</h1>
            <input type="text" id="user-name" placeholder="귀족의 성함을 입력하세요">
            <input type="password" id="admin-key" placeholder="방장 생성 코드 (00123)">
            
            <div class="btn-group">
                <button class="tab-btn active" id="tab-multi" onclick="setTab('multi')">성 목록</button>
                <button class="tab-btn" id="tab-npc" onclick="setTab('npc')">NPC 대전</button>
            </div>

            <div id="room-list"></div>

            <button class="primary-btn" id="create-trigger" onclick="openCreateModal()">새로운 성 건설하기</button>
        </div>
    </div>

    <div id="create-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>NEW COURT</h1>
            <input type="text" id="new-room-name" placeholder="성의 명칭 (예: 태양의 궁전)">
            <input type="password" id="new-room-pw" placeholder="비밀번호 설정 (가려짐)">
            <button class="primary-btn" onclick="confirmCreate()">건설 완료</button>
            <button class="tab-btn" style="margin-top:10px; border:none;" onclick="closeModals()">취소</button>
        </div>
    </div>

    <div id="join-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1>ENTER GATE</h1>
            <p id="join-target-desc" style="color:var(--gold);"></p>
            <input type="password" id="join-pw-input" placeholder="비밀번호를 입력하세요">
            <button class="primary-btn" onclick="confirmJoin()">입장하기</button>
            <button class="tab-btn" style="margin-top:10px; border:none;" onclick="closeModals()">취소</button>
        </div>
    </div>

    <div id="left-panel">
        <div style="background:#f4e4bc; color:#2c1810; padding:20px; border-radius:10px; flex:1; overflow-y:auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);">
            <h2 style="font-family:Cinzel; border-bottom:2px solid #2c1810; padding-bottom:10px;">Hierarchy</h2>
            <div id="hierarchy-list" style="font-size:0.9rem; line-height:1.8;"></div>
        </div>
        <button class="primary-btn" style="margin-top:15px; background:var(--danger); color:white;" onclick="exitGame()">항복 및 탈출</button>
        <button id="admin-destroy-btn" class="primary-btn" style="margin-top:10px; background:#444; display:none;" onclick="destroyCourt()">성 파괴 (방장)</button>
    </div>

    <main id="arena" style="display:flex; flex-direction:column; visibility:hidden;">
        <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <div id="status-msg" style="color:var(--gold); font-family:Cinzel; font-size:1.5rem; margin-bottom:30px; letter-spacing:2px;">WAITING FOR NOBLES...</div>
            <div id="host-controls" style="display:none; margin-bottom:20px;">
                <button class="primary-btn" style="width:250px;" onclick="startGame()">새 시대 개막</button>
            </div>
            <div class="table-rim"><div id="table-cards" style="display:flex;"></div></div>
        </div>

        <div id="player-dock">
            <div id="action-bar" style="display:none; gap:15px; margin-bottom:10px;">
                <button class="primary-btn" id="play-btn" style="width:140px;" onclick="handlePlay()">패 내기</button>
                <button class="primary-btn" id="pass-btn" style="width:140px; background:#444;" onclick="handlePass()">패스</button>
            </div>
            <div id="hand"></div>
        </div>
    </main>

    <aside id="right-panel">
        <h3 style="font-family:Cinzel; text-align:center; color:var(--gold);">Social Status</h3>
        <div id="status-list" style="flex:1; margin-bottom:20px;"></div>
        <div id="log-box"></div>
        <input type="text" id="chat-input" placeholder="대화를 나누세요..." onkeypress="if(event.key==='Enter') sendMsg()">
    </aside>

    <script>
        // --- Core Settings ---
        const config = {
            apiKey: "AIzaSyCmoc8BJt81KTfni_hA6FO8w9s_B5yTidc",
            authDomain: "gamee-10378.firebaseapp.com",
            databaseURL: "https://gamee-10378-default-rtdb.firebaseio.com",
            projectId: "gamee-10378"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        const RANKS = ["", "Greater Dalmuti", "Lesser Dalmuti", "Archbishop", "Abbot", "Knight", "Cavalier", "Merchant", "Yeoman", "Shepherd", "Cook", "Mason", "Seamstress", "Peasant"];
        let myId = 'u_' + Math.random().toString(36).substr(2, 9);
        let myName = "", currentRoomId = null, isHost = false, selected = [], state = {}, currentTab = 'multi', isNPCMode = false;

        // --- Init UI ---
        const hList = document.getElementById('hierarchy-list');
        for(let i=1; i<=13; i++) hList.innerHTML += `<div><b>${i}</b>. ${RANKS[i]}</div>`;

        function setTab(t) {
            currentTab = t;
            document.getElementById('tab-multi').className = t==='multi'?'tab-btn active':'tab-btn';
            document.getElementById('tab-npc').className = t==='npc'?'tab-btn active':'tab-btn';
            document.getElementById('create-trigger').style.display = t==='multi'?'block':'none';
            renderRooms();
        }

        // --- Room Management ---
        function renderRooms() {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            if(currentTab === 'npc') {
                list.innerHTML = `<div class="room-card" onclick="startNPC()">
                    <span>🤖 NPC 연습 경기장 (1인용)</span><span style="color:var(--success)">[즉시입장]</span>
                </div>`;
                return;
            }
            db.ref('rooms').on('value', snap => {
                if(currentTab !== 'multi') return;
                list.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) { list.innerHTML = '<p style="color:#666; margin-top:20px;">건설된 성이 없습니다.</p>'; return; }
                Object.keys(rooms).forEach(id => {
                    const r = rooms[id];
                    list.innerHTML += `<div class="room-card" onclick="preJoin('${id}', '${r.roomTitle}')">
                        <div><b style="color:var(--gold)">🏰 ${r.roomTitle}</b><br><small>${Object.keys(r.players||{}).length}명 대기중</small></div>
                        <span>🔒</span>
                    </div>`;
                });
            });
        }
        setTab('multi');

        function openCreateModal() {
            if(document.getElementById('admin-key').value !== "00123") return alert("방장 생성 코드가 일치하지 않습니다.");
            if(!document.getElementById('user-name').value.trim()) return alert("성함을 입력하세요.");
            document.getElementById('create-screen').style.display = 'flex';
        }

        function confirmCreate() {
            const title = document.getElementById('new-room-name').value.trim();
            const pw = document.getElementById('new-room-pw').value.trim();
            if(!title || !pw) return alert("방제와 비밀번호를 모두 입력하세요.");
            
            myName = document.getElementById('user-name').value;
            currentRoomId = 'r_' + Date.now();
            isHost = true;
            isNPCMode = false;

            db.ref('rooms/' + currentRoomId).set({
                host: myId, title: title, password: pw, status: 'waiting',
                players: { [myId]: { name: myName, cards: [], rank: 1 } },
                turnOrder: [myId], tableCards: [], lastMove: { val: 14, count: 0, owner: "" }
            }).then(initGame);
        }

        function preJoin(id, title) {
            if(!document.getElementById('user-name').value.trim()) return alert("성함을 먼저 입력하세요.");
            currentRoomId = id;
            document.getElementById('join-target-desc').innerText = `[${title}] 성에 입장하시겠습니까?`;
            document.getElementById('join-screen').style.display = 'flex';
        }

        function confirmJoin() {
            db.ref('rooms/' + currentRoomId).once('value', s => {
                const r = s.val();
                if(document.getElementById('join-pw-input').value === r.password) {
                    myName = document.getElementById('user-name').value;
                    db.ref(`rooms/${currentRoomId}/players/${myId}`).set({ name: myName, cards: [], rank: 99 });
                    db.ref(`rooms/${currentRoomId}/turnOrder`).once('value', so => {
                        let o = so.val() || []; o.push(myId);
                        db.ref(`rooms/${currentRoomId}/turnOrder`).set(o);
                    });
                    initGame();
                } else alert("비밀번호가 올바르지 않습니다.");
            });
        }

        // --- NPC AI Mode ---
        function startNPC() {
            myName = document.getElementById('user-name').value.trim() || "Noble Traveler";
            isNPCMode = true; isHost = true; currentRoomId = "npc_local";
            state = {
                status: 'waiting',
                players: {
                    [myId]: { name: myName, cards: [], rank: 1 },
                    'c1': { name: '컴퓨터1', cards: [], rank: 2 },
                    'c2': { name: '컴퓨터2', cards: [], rank: 3 },
                    'c3': { name: '컴퓨터3', cards: [], rank: 4 }
                },
                turnOrder: [myId, 'c1', 'c2', 'c3'],
                turnIndex: 0, tableCards: [], lastMove: { val: 14, count: 0, owner: "" }, passCount: 0
            };
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('arena').style.visibility = 'visible';
            updateUI();
        }

        // --- Game Engine ---
        function startGame() {
            let deck = [];
            for(let i=1; i<=12; i++) for(let j=0; j<i; j++) deck.push(i);
            deck.push(13, 13);
            deck.sort(() => Math.random() - 0.5);

            let ids = Object.keys(state.players);
            ids.forEach(id => state.players[id].cards = []);
            let i = 0; while(deck.length) { state.players[ids[i%ids.length]].cards.push(deck.pop()); i++; }

            state.status = 'playing'; state.turnIndex = 0; state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
            sync();
        }

        function updateUI() {
            const order = state.turnOrder || [];
            const sList = document.getElementById('status-list'); sList.innerHTML = '';
            order.forEach((id, i) => {
                const p = state.players[id];
                const active = state.turnIndex === i;
                sList.innerHTML += `<div style="padding:12px; margin-bottom:8px; background:${active?'rgba(197,160,89,0.15)':'#222'}; border-radius:10px; border-left:4px solid ${active?'var(--gold)':'transparent'}">
                    <div style="display:flex; justify-content:space-between">
                        <b>${p.name}</b> <span class="rank-badge ${i<2?'rank-gold':''}">${RANKS[i+1]}</span>
                    </div>
                    <div style="font-size:0.75rem; color:#777; margin-top:5px;">CARDS: ${p.cards.length}</div>
                </div>`;
            });

            const handDiv = document.getElementById('hand'); handDiv.innerHTML = '';
            const myCards = (state.players[myId]?.cards || []).sort((a,b)=>a-b);
            myCards.forEach((v, i) => {
                const c = document.createElement('div');
                c.className = `card ${selected.includes(i)?'selected':''}`;
                c.innerHTML = `<div class="val">${v}</div><div class="title">${RANKS[v]}</div><div class="val" style="align-self:flex-end">${v}</div>`;
                c.onclick = () => {
                    if(order[state.turnIndex] === myId) {
                        if(selected.length > 0 && v !== myCards[selected[0]] && v !== 13) selected = [];
                        const pos = selected.indexOf(i);
                        if(pos > -1) selected.splice(pos, 1); else selected.push(i);
                        updateUI();
                    }
                };
                handDiv.appendChild(c);
            });

            const tCards = document.getElementById('table-cards'); tCards.innerHTML = '';
            (state.tableCards || []).forEach(v => {
                tCards.innerHTML += `<div class="card played-card"><div class="val">${v}</div><div class="title">${RANKS[v]}</div><div class="val" style="align-self:flex-end">${v}</div></div>`;
            });

            const myTurn = order[state.turnIndex] === myId;
            document.getElementById('action-bar').style.display = state.status === 'playing' ? 'flex' : 'none';
            document.getElementById('play-btn').disabled = !myTurn || selected.length === 0;
            document.getElementById('pass-btn').disabled = !myTurn || state.lastMove.owner === "";
            document.getElementById('host-controls').style.display = (isHost && state.status !== 'playing') ? 'block' : 'none';
            document.getElementById('admin-destroy-btn').style.display = isHost && !isNPCMode ? 'block' : 'none';
            document.getElementById('status-msg').innerText = myTurn ? "YOUR TURN" : `${state.players[order[state.turnIndex]].name}'S TURN`;

            if(isNPCMode && !myTurn && state.status === 'playing') setTimeout(npcAI, 1200);
        }

        function handlePlay() {
            const hand = state.players[myId].cards.sort((a,b)=>a-b);
            let v = hand[selected[0]]; const c = selected.length;
            if(state.lastMove.owner==="" || (v < state.lastMove.val && c === state.lastMove.count)) {
                selected.sort((a,b)=>b-a).forEach(idx => hand.splice(idx, 1));
                selected = [];
                state.lastMove = { val: v, count: c, owner: myId };
                state.tableCards = Array(c).fill(v);
                state.passCount = 0;
                checkWin(myId);
                next();
            }
        }

        function handlePass() {
            state.passCount++;
            if(state.passCount >= state.turnOrder.length - 1) {
                state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
            }
            next();
        }

        function npcAI() {
            const npcId = state.turnOrder[state.turnIndex];
            const hand = state.players[npcId].cards.sort((a,b)=>a-b);
            const last = state.lastMove;
            let play = [];
            
            if(last.owner === "") {
                const target = hand[hand.length-1];
                play = hand.filter(x => x === target);
            } else {
                for(let v=1; v<last.val; v++) {
                    const found = hand.filter(x => x === v);
                    if(found.length >= last.count) { play = found.slice(0, last.count); break; }
                }
            }

            if(play.length > 0) {
                const val = play[0];
                play.forEach(pv => hand.splice(hand.indexOf(pv), 1));
                state.lastMove = { val: val, count: play.length, owner: npcId };
                state.tableCards = play; state.passCount = 0;
                log(`[${state.players[npcId].name}]가 ${val}을 ${play.length}장 냈습니다.`);
                checkWin(npcId);
            } else {
                state.passCount++;
                log(`[${state.players[npcId].name}]가 패스했습니다.`);
                if(state.passCount >= state.turnOrder.length - 1) {
                    state.tableCards = []; state.lastMove = { val: 14, count: 0, owner: "" }; state.passCount = 0;
                }
            }
            next();
        }

        function next() { state.turnIndex = (state.turnIndex + 1) % state.turnOrder.length; sync(); }
        function checkWin(id) { if(state.players[id].cards.length === 0) { state.status = 'waiting'; alert(`${state.players[id].name} 승리! 시대가 종료됩니다.`); } }
        function sync() { if(isNPCMode) updateUI(); else db.ref('rooms/' + currentRoomId).update(state); }

        // --- Utils ---
        function initGame() {
            document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none');
            document.getElementById('arena').style.visibility = 'visible';
            db.ref('rooms/' + currentRoomId).on('value', snap => {
                state = snap.val();
                if(!state) return location.reload();
                isHost = state.host === myId;
                updateUI();
            });
        }
        function closeModals() { document.querySelectorAll('.overlay').forEach(e => { if(e.id !== 'lobby-screen') e.style.display = 'none'; }); }
        function exitGame() { if(confirm("성을 떠나시겠습니까?")) location.reload(); }
        function destroyCourt() { if(confirm("성을 완전히 파괴합니다.")) db.ref('rooms/' + currentRoomId).remove(); }
        function log(m) { const b = document.getElementById('log-box'); b.innerHTML += `<div>${m}</div>`; b.scrollTop = b.scrollHeight; }
        function sendMsg() { const i = document.getElementById('chat-input'); if(i.value) { log(`<b>${myName}:</b> ${i.value}`); i.value=''; } }
    </script>
</body>
</html>
